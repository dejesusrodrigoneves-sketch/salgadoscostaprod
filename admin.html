<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>Pedidos - Fabrica de salgados Costa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="js/theme.js"></script>

<style>
/* ═══════════════════════════════════════════════════════
   Vibrant Hospitality — Painel de Pedidos
   ═══════════════════════════════════════════════════════ */

*,
*::before,
*::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary:         #F26D3D;
  --primary-hover:   #E05A2A;
  --primary-bg:      #FFF0EA;
  --secondary:       #FFFAF8;
  --surface:         #FFFFFF;
  --text:            #2D1A12;
  --text-muted:      #7C7C7C;
  --success:         #4CAF50;
  --warning:         #F59E0B;
  --danger:          #DC2626;
  --border:          #E8E4DF;
  --r-card:   16px;
  --r-btn:    12px;
  --r-pill:   999px;
  --r-tab:    8px;
  --s-4:  4px;
  --s-8:  8px;
  --s-12: 12px;
  --s-16: 16px;
  --s-20: 20px;
  --s-24: 24px;
  --s-32: 32px;
  --font: 'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif;
}

body {
  font-family: var(--font);
  font-weight: 400;
  background: var(--secondary);
  color: var(--text);
  padding: var(--s-32);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─── HEADER ─── */

.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--s-32);
  flex-wrap: wrap;
  gap: var(--s-16);
}

.page-header h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.014em;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: var(--s-12);
}

.page-header h1 i {
  font-size: 22px;
  color: var(--primary);
}

/* ─── STATS ROW ─── */

.stats-row {
  display: flex;
  gap: var(--s-8);
  flex-wrap: wrap;
}

.stat-chip {
  padding: 6px var(--s-16);
  border-radius: var(--r-pill);
  font-size: 12px;
  font-weight: 600;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: var(--s-8);
  color: var(--text-muted);
  letter-spacing: -0.007em;
}

.stat-chip i {
  font-size: 12px;
  color: var(--primary);
}

.stat-chip .count {
  background: var(--primary);
  color: #fff;
  border-radius: var(--r-pill);
  padding: 2px 10px;
  font-size: 11px;
  font-weight: 700;
}

/* ─── TABS ─── */

.tabs {
  display: flex;
  gap: var(--s-8);
  margin-bottom: var(--s-24);
  flex-wrap: wrap;
}

.tab {
  padding: 8px var(--s-20);
  border: 1px solid var(--border);
  border-radius: var(--r-tab);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  background: var(--surface);
  color: var(--text-muted);
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  gap: var(--s-8);
  user-select: none;
  letter-spacing: -0.007em;
}

.tab:hover {
  border-color: var(--primary);
  color: var(--text);
}

.tab.active {
  background: var(--primary-bg);
  border-color: var(--primary);
  color: var(--text);
}

.tab i {
  font-size: 12px;
}

.tab.active i {
  color: var(--primary);
}

.tab .tab-count {
  background: var(--border);
  color: var(--text-muted);
  border-radius: var(--r-pill);
  padding: 1px 8px;
  font-size: 11px;
  font-weight: 600;
}

.tab.active .tab-count {
  background: var(--primary);
  color: #fff;
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── ORDER CARD ─── */

.order-card {
  background: var(--surface);
  border-radius: var(--r-card);
  border: 1px solid var(--border);
  overflow: hidden;
  margin-bottom: var(--s-16);
  transition: border-color 0.2s;
}

.order-card:hover {
  border-color: var(--primary);
}

.order-card.status-pendente  { border-left: 4px solid var(--danger); background: #FEF2F2; animation: pulse-pendente 2s ease-in-out infinite; }
.order-card.status-producao  { border-left: 3px solid var(--warning); }
.order-card.status-pronto    { border-left: 3px solid var(--primary); }
.order-card.status-emRota    { border-left: 3px solid var(--primary); }
.order-card.status-finalizado{ border-left: 3px solid var(--success); }

@keyframes pulse-pendente {
  0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.25); }
  50%      { box-shadow: 0 0 0 10px rgba(220,38,38,0); }
}

.badge-novo {
  display: inline-block;
  font-size: 9px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--danger);
  background: #FEE2E2;
  padding: 2px 6px;
  border-radius: 4px;
  margin-left: 8px;
  animation: blink-novo 1s step-end infinite;
}

@keyframes blink-novo {
  50% { opacity: 0; }
}

.btn-aceitar {
  background: var(--success);
  color: #fff;
  border: none;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border-radius: var(--r-btn);
  transition: background 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  justify-content: center;
}

.btn-aceitar:hover {
  background: #16A34A;
}

.stat-pendente {
  animation: pulse-stat 2s ease-in-out infinite;
}

.order-header.no-toggle {
  cursor: default;
}

@keyframes pulse-stat {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.5; }
}

.order-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--s-16) var(--s-20);
  cursor: pointer;
  background: transparent;
  transition: background 0.2s;
  gap: var(--s-12);
  flex-wrap: wrap;
}

.order-header:hover {
  background: rgba(0,0,0,0.02);
}

.order-header-left {
  display: flex;
  align-items: center;
  gap: var(--s-12);
  flex-wrap: wrap;
}

.order-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}

.order-code {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
}

.order-status {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 10px;
  border-radius: var(--r-pill);
  font-size: 11px;
  font-weight: 600;
}

.order-status.status-pendente   { background: #FEE2E2; color: var(--danger); font-weight: 700; }
.order-status.status-producao   { background: #FEF3C7; color: var(--warning); }
.order-status.status-pronto     { background: var(--primary-bg); color: var(--primary); }
.order-status.status-emRota     { background: var(--primary-bg); color: var(--primary); }
.order-status.status-finalizado { background: #DCFCE7; color: var(--success); }

.order-header-right {
  display: flex;
  align-items: center;
  gap: var(--s-8);
}

.order-total {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}

.order-toggle {
  font-size: 12px;
  color: var(--text-muted);
  transition: transform 0.3s ease;
}

.order-card.open .order-toggle {
  transform: rotate(180deg);
}

/* ─── ORDER BODY ─── */

.order-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease, padding 0.3s ease;
  padding: 0 var(--s-20);
}

.order-card.open .order-body {
  max-height: 2000px;
  padding: 0 var(--s-20) var(--s-20);
}

.order-info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: var(--s-8);
  margin-bottom: var(--s-16);
  padding-top: var(--s-12);
  border-top: 1px solid var(--border);
}

.info-item {
  font-size: 12px;
  color: var(--text-muted);
}

.info-item strong {
  display: block;
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 500;
  margin-bottom: 2px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ─── ITEMS ─── */

.items-list {
  margin-bottom: var(--s-16);
}

.items-list h4 {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: var(--s-8);
  font-weight: 600;
}

.item-row {
  display: flex;
  justify-content: space-between;
  padding: 3px 0;
  font-size: 13px;
  color: var(--text);
}

.item-row .qty {
  color: var(--warning);
  font-weight: 700;
  margin-right: 6px;
}

.sub-item {
  margin-left: var(--s-20);
  font-size: 12px;
  color: var(--text-muted);
}

/* ─── ACTIONS ─── */

.order-actions {
  display: flex;
  gap: var(--s-8);
  flex-wrap: wrap;
  padding-top: var(--s-12);
  border-top: 1px solid var(--border);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px var(--s-16);
  border: 1px solid var(--border);
  border-radius: var(--r-btn);
  background: var(--surface);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  user-select: none;
  color: var(--text-muted);
  letter-spacing: -0.007em;
}

.btn:active {
  transform: scale(0.97);
}

.btn-sm {
  padding: 6px var(--s-12);
  font-size: 11px;
}

.btn-producao { color: var(--warning); }
.btn-producao:hover { background: #FEF3C7; border-color: var(--warning); }

.btn-pronto { color: var(--primary); }
.btn-pronto:hover { background: var(--primary-bg); border-color: var(--primary); }

.btn-rota { color: var(--primary); }
.btn-rota:hover { background: var(--primary-bg); border-color: var(--primary); }

.btn-finalizar { color: var(--success); }
.btn-finalizar:hover { background: #DCFCE7; border-color: var(--success); }

.btn-whatsapp { color: var(--success); }
.btn-whatsapp:hover { background: #DCFCE7; border-color: var(--success); }

.btn-print { color: var(--text-muted); }
.btn-print:hover { background: var(--border); border-color: var(--text-muted); }

.btn-delete { color: var(--danger); }
.btn-delete:hover { background: #FEF2F2; border-color: var(--danger); }

.btn-modal-confirm {
  background: var(--primary);
  color: #fff;
  border: none;
}

.btn-modal-confirm:hover {
  background: var(--primary-hover);
}

.btn-modal-cancel {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
}

.btn-modal-cancel:hover {
  background: var(--border);
  color: var(--text);
}

/* ─── TOAST ─── */

.toast-container {
  position: fixed;
  bottom: var(--s-24);
  right: var(--s-24);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: var(--s-8);
  max-width: 380px;
}

.toast {
  padding: 14px 18px;
  border-radius: var(--r-card);
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  animation: toastIn 0.3s ease;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: opacity 0.3s ease;
}

.toast-success { background: var(--success); }
.toast-danger  { background: var(--danger); }
.toast-warning { background: var(--warning); }
.toast-info    { background: var(--primary); }

.toast i { font-size: 16px; }

@keyframes toastIn {
  from { transform: translateX(100%); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}

/* ─── MODALS ─── */

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10000;
  animation: modalFade 0.2s ease;
  backdrop-filter: blur(2px);
}

@keyframes modalFade {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.modal-box {
  background: var(--surface);
  border-radius: var(--r-card);
  padding: var(--s-24);
  max-width: 420px;
  width: 90%;
  border: 1px solid var(--border);
  animation: modalSlide 0.2s ease;
}

@keyframes modalSlide {
  from { transform: scale(0.96); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

.modal-box h3 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: var(--s-8);
  letter-spacing: -0.008em;
}

.modal-box p {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: var(--s-20);
  line-height: 1.5;
}

.modal-actions {
  display: flex;
  gap: var(--s-8);
  justify-content: flex-end;
}

/* ─── DRIVER SELECTION ─── */

.driver-modal-list {
  display: flex;
  flex-direction: column;
  gap: var(--s-8);
  max-height: 300px;
  overflow-y: auto;
}

.driver-option {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--s-12) var(--s-16);
  border-radius: var(--r-btn);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
  background: var(--surface);
}

.driver-option:hover {
  border-color: var(--primary);
  background: var(--primary-bg);
}

.driver-option.selected {
  border-color: var(--primary);
  background: var(--primary-bg);
}

.driver-option .driver-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.driver-option .driver-name {
  font-weight: 600;
  font-size: 14px;
  color: var(--text);
}

.driver-option .driver-detail {
  font-size: 12px;
  color: var(--text-muted);
}

.driver-option .driver-check {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.2s;
  color: transparent;
}

.driver-option.selected .driver-check {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
}

/* ─── LOADING SKELETON ─── */

.skeleton {
  background: linear-gradient(90deg, var(--border) 25%, var(--secondary) 50%, var(--border) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--r-card);
  height: 80px;
  margin-bottom: var(--s-12);
  border: 1px solid var(--border);
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ─── EMPTY STATE ─── */

.empty-state {
  text-align: center;
  padding: 64px var(--s-20);
  color: var(--text-muted);
}

.empty-state i {
  font-size: 48px;
  margin-bottom: var(--s-16);
  opacity: 0.4;
  color: var(--primary);
}

.empty-state p {
  font-size: 14px;
  font-weight: 500;
}

/* ─── RESPONSIVE ─── */

@media (max-width: 768px) {
  body { padding: var(--s-16); }
  .page-header { flex-direction: column; align-items: flex-start; }
  .stats-row { width: 100%; justify-content: flex-start; overflow-x: auto; }
  .order-header { flex-direction: column; align-items: flex-start; }
  .order-actions { flex-direction: column; }
  .btn { width: 100%; justify-content: center; }
}
</style>

<script src="js/utils.js"></script>
<script>
function api(path, opts) {
  var headers = { 'Content-Type': 'application/json' };
  var token = (JSON.parse(localStorage.getItem('authUser') || '{}')).token;
  if (token) headers['Authorization'] = 'Bearer ' + token;
  return fetch('/api' + path, { headers: headers, ...opts }).then(function(r) {
    if (!r.ok) return r.json().then(function(e) { throw new Error(e.error || 'Erro ' + r.status); });
    return r.json();
  });
}
</script>

    <div class="stat-chip"><i class="fas fa-cog"></i> Produção <span class="count" id="statProducao">0</span></div>

<div class="tabs" id="tabsContainer">
  <div class="tab active" data-tab="pendente"><i class="fas fa-exclamation-triangle"></i> Pendentes <span class="tab-count" id="tabCountPendente" style="background:var(--danger);color:#fff">0</span></div>
  <div class="tab" data-tab="producao"><i class="fas fa-cog"></i> Produção <span class="tab-count" id="tabCountProducao">0</span></div>

<div id="producao" class="tab-content"></div>

<div class="toast-container" id="toastContainer"></div>

<script>
if (!authGuard()) throw new Error('Redirect');

<script>
const containers = {
  pendente: document.getElementById('pendente'),
  producao: document.getElementById('producao'),
  pronto: document.getElementById('pronto'),
  emRota: document.getElementById('emRota')
};

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab).classList.add('active');
  });
});
</script>
<script>
function fmtItens(itens) {
  if (!Array.isArray(itens)) return '<p style="font-size:12px;color:var(--stone)">Sem itens</p>';
  let html = '<div class="items-list"><h4>Itens</h4>';
  itens.forEach(i => {
    const parts = i.split('\u2192');
    if (parts.length === 2) {
      const titulo = parts[0].trim();
      const subitens = parts[1].split(',').map(s => s.trim()).filter(Boolean);
      html += '<div class="item-row"><strong>' + escapeHtml(titulo) + '</strong></div>';
      subitens.forEach(sub => {
        html += '<div class="sub-item">' + escapeHtml(sub) + '</div>';
      });
    } else {
      html += '<div class="item-row">' + escapeHtml(i) + '</div>';
    }
  });
  html += '</div>';
  return html;
}

function enviarWhatsapp(numero, mensagem) {
  const link = 'https://api.whatsapp.com/send?phone=+55' + numero + '&text=' + encodeURIComponent(mensagem);
  window.open(link, '_blank');
}

function gerarHTMLImpressao(p) {
  let html = `
    <html><head><style>
      body { font-family: monospace; font-size: 12px; width: 230px; }
      h2,h3 { text-align: center; margin: 5px 0; }
      hr { border: 0; border-top: 1px dashed #000; margin: 5px 0; }
    </style></head><body>
      <h2>Comprovante de Pedido</h2>
      <p><strong>Código:</strong> ${p.id || '-'}</p>
      <p><strong>Entrega:</strong> ${p.tipoEntrega || '-'}</p>
      <p><strong>Cliente:</strong> ${p.cliente?.nome || '-'}</p>
      <p><strong>Whatsapp:</strong> ${p.cliente?.whatsapp || '-'}</p>
      <p><strong>Endereço:</strong> ${p.cliente?.endereco || '-'}, ${p.cliente?.numero || '-'}</p>
      <p><strong>Bairro:</strong> ${p.cliente?.bairro || '-'}</p>
      <p><strong>Ref:</strong> ${p.cliente?.pontoReferencia || '-'}</p>
      <p><strong>Pagamento:</strong> ${p.formaPagamento || '-'}</p>
      <p><strong>Troco:</strong> ${p.troco || '-'}</p>
      <hr />`;
  if (Array.isArray(p.itens)) {
    html += '<h3>Itens:</h3>';
    p.itens.forEach(i => {
      const parts = i.split('\u2192');
      if (parts.length === 2) {
        html += '<p><strong>' + escapeHtml(parts[0].trim()) + ' \u2192</strong></p>';
        parts[1].split(',').map(s => s.trim()).filter(Boolean).forEach(sub => {
          html += '<p style="margin-left:10px;">' + escapeHtml(sub) + '</p>';
        });
      } else {
        html += '<p>' + escapeHtml(i) + '</p>';
      }
    });
  }
  html += '<hr>' +
    '<p><strong>Total itens:</strong> ' + fmtMoeda(p.valores?.itens) + '<br>' +
    '<strong>Taxa cartão:</strong> ' + (p.taxaCartao ? fmtMoeda(p.taxaCartao) : 'R$ 0,00') + '<br>' +
    '<strong>Taxa entrega:</strong> ' + fmtMoeda(p.valores?.entrega) + '<br>' +
    '<strong>Desconto:</strong> ' + fmtMoeda(p.valores?.desconto) + '<br><br>' +
    '<strong>Total:</strong> ' + fmtMoeda(p.valores?.total) + '</p>' +
    '<hr><p style="text-align:center;">Obrigado pelo seu pedido!</p>' +
    '</body></html>';
  return html;
}

function imprimirPedido(p) {
  const w = window.open('', '', 'width=300,height=600');
  w.document.write(gerarHTMLImpressao(p));
  w.document.close();
  w.focus();
  w.print();
  w.close();
}

function atualizarBadgeEsteira() {
  const total = document.querySelectorAll('.order-card').length;
  window.parent.postMessage({ tipo: 'atualizarBadge', total }, window.location.origin);
}

function renderCard(p, docId) {
  const statusMap = {
    pendente: 'Pendente', producao: 'Produção', pronto: 'Pronto', emRota: 'Em Rota'
  };

  const card = document.createElement('div');
  card.className = 'order-card status-' + p.status;
  card.dataset.status = p.status;

  const nome = p.cliente?.nome || 'Cliente';
  const total = fmtMoeda(p.valores?.total);
  const isPendente = p.status === 'pendente';

  card.innerHTML = `
    <div class="order-header${isPendente ? ' no-toggle' : ''}" ${isPendente ? '' : 'onclick="this.closest(\'.order-card\').classList.toggle(\'open\')"'}>
      <div class="order-header-left">
        <span class="order-name">${escapeHtml(nome)}</span>
        <span class="order-code">#${docId.slice(-6)}</span>
        <span class="order-status status-${p.status}">${statusMap[p.status] || p.status}</span>
        ${isPendente ? '<span class="badge-novo">NOVO</span>' : ''}
      </div>
      <div class="order-header-right">
        <span class="order-total">${total}</span>
        ${isPendente ? '' : '<i class="fas fa-chevron-down order-toggle"></i>'}
      </div>
    </div>
    <div class="order-body">
      <div class="order-info-grid">
        <div class="info-item"><strong>Whatsapp</strong>${p.cliente?.whatsapp || '-'}</div>
        <div class="info-item"><strong>Endereço</strong>${p.cliente?.endereco || '-'}, ${p.cliente?.numero || '-'}</div>
        <div class="info-item"><strong>Bairro</strong>${p.cliente?.bairro || '-'}</div>
        <div class="info-item"><strong>CEP</strong>${p.cep || '-'}</div>
        <div class="info-item"><strong>Ref</strong>${p.cliente?.pontoReferencia || '-'}</div>
        <div class="info-item"><strong>Pagamento</strong>${p.formaPagamento || '-'}</div>
        <div class="info-item"><strong>Troco</strong>${p.troco ? fmtMoeda(p.troco) : '-'}</div>
        <div class="info-item"><strong>Total Itens</strong>${fmtMoeda(p.valores?.itens)}</div>
        <div class="info-item"><strong>Taxa Cartão</strong>${p.taxaCartao ? fmtMoeda(p.taxaCartao) : '-'}</div>
        <div class="info-item"><strong>Taxa Entrega</strong>${fmtMoeda(p.valores?.entrega)}</div>
        <div class="info-item"><strong>Desconto</strong>${fmtMoeda(p.valores?.desconto)}</div>
      </div>
      ${fmtItens(p.itens)}
      <div class="order-actions">
        ${isPendente ? `
          <button class="btn-aceitar" data-action="aceitar"><i class="fas fa-check"></i> Aceitar Pedido</button>
          <button class="btn btn-print" data-action="print"><i class="fas fa-print"></i> Imprimir</button>
        ` : `
          <button class="btn btn-producao" data-action="producao"><i class="fas fa-box"></i> Produção</button>
          <button class="btn btn-pronto" data-action="pronto"><i class="fas fa-bell"></i> Pronto</button>
          <button class="btn btn-rota" data-action="rota"><i class="fas fa-truck"></i> Em Rota</button>
          <button class="btn btn-finalizar" data-action="finalizar"><i class="fas fa-check"></i> Finalizar</button>
          <button class="btn btn-whatsapp" data-action="whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp</button>
          <button class="btn btn-print" data-action="print"><i class="fas fa-print"></i> Imprimir</button>
          <button class="btn btn-delete" data-action="delete"><i class="fas fa-trash"></i> Excluir</button>
        `}
      </div>
    </div>
  `;

  if (isPendente) {
    card.querySelector('[data-action="aceitar"]').onclick = async () => {
      await api('/pedidos/' + docId + '/status', { method: 'PATCH', body: JSON.stringify({ status: 'producao' }) });
      toast('Pedido aceito e enviado para produção!', 'success');
      carregarPedidos();
    };
    card.querySelector('[data-action="print"]').onclick = () => imprimirPedido(p);
    return card;
  }

  card.querySelector('[data-action="producao"]').onclick = async () => {
    await api('/pedidos/' + docId + '/status', { method: 'PATCH', body: JSON.stringify({ status: 'producao' }) });
    toast('Pedido enviado para produção', 'warning');
    carregarPedidos();
  };

  card.querySelector('[data-action="pronto"]').onclick = async () => {
    await api('/pedidos/' + docId + '/status', { method: 'PATCH', body: JSON.stringify({ status: 'pronto' }) });
    toast(nome + ', seu pedido está pronto!', 'success');
    carregarPedidos();
  };

  card.querySelector('[data-action="rota"]').onclick = async () => {
    const driverId = await selecionarEntregadorModal(nome);
    if (!driverId) return;
    await api('/pedidos/' + docId + '/status', { method: 'PATCH', body: JSON.stringify({ status: 'emRota', entregadorId: driverId }) });
    try {
      await api('/entregas', { method: 'POST', body: JSON.stringify({ entregadorId: Number(driverId), pedidoId: docId, valor: Number(p.total) || 0 }) });
    } catch(e) {
      toast('Erro ao registrar entrega, mas status foi atualizado', 'warning');
    }
    toast('Pedido em rota com ' + driverId + '!', 'info');
    carregarPedidos();
  };

  card.querySelector('[data-action="finalizar"]').onclick = async () => {
    const ok = await confirmModal('Deseja finalizar o pedido de ' + nome + '?');
    if (!ok) return;
    await api('/pedidos/' + docId + '/finalizar', { method: 'POST' });
    toast('Pedido finalizado!', 'success');
    carregarPedidos();
    atualizarBadgeEsteira();
  };

  card.querySelector('[data-action="whatsapp"]').onclick = () => {
    if (p.cliente?.whatsapp) {
      enviarWhatsapp(p.cliente.whatsapp, 'Olá ' + nome + ', tudo sobre seu pedido!');
    } else {
      toast('Cliente sem WhatsApp cadastrado', 'warning');
    }
  };

  card.querySelector('[data-action="print"]').onclick = () => imprimirPedido(p);

  card.querySelector('[data-action="delete"]').onclick = async () => {
    const ok = await confirmModal('Deseja excluir o pedido de ' + nome + '?');
    if (!ok) return;
    await api('/pedidos/' + docId, { method: 'DELETE' });
    carregarPedidos();
    atualizarBadgeEsteira();
    toast('Pedido excluído', 'danger');
  };

  return card;
}

function updateStats() {
  const counts = {};
  document.querySelectorAll('.order-card').forEach(c => {
    const s = c.dataset.status;
    counts[s] = (counts[s] || 0) + 1;
  });
  document.getElementById('statPendente').textContent = counts.pendente || 0;
  document.getElementById('statProducao').textContent = counts.producao || 0;
  document.getElementById('statPronto').textContent = counts.pronto || 0;
  document.getElementById('statRota').textContent = counts.emRota || 0;
  document.getElementById('tabCountPendente').textContent = counts.pendente || 0;
  document.getElementById('tabCountProducao').textContent = counts.producao || 0;
  document.getElementById('tabCountPronto').textContent = counts.pronto || 0;
  document.getElementById('tabCountRota').textContent = counts.emRota || 0;
}

async function selecionarEntregadorModal(pedidoNome) {
  return new Promise(async (resolve) => {
    var drivers = [];
    try { drivers = await api('/entregadores?ativo=true'); } catch(e) {}
    if (!drivers || drivers.length === 0) { toast('Nenhum entregador ativo cadastrado.', 'warning'); resolve(null); return; }

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-box">
        <h3>Selecionar Entregador</h3>
        <p style="margin-bottom:16px;">Atribuir entregador para o pedido de <strong>${pedidoNome}</strong></p>
        <div class="driver-modal-list" id="driverModalList">
          ${drivers.map(d => `
            <div class="driver-option" data-id="${d.id}">
              <div class="driver-info">
                <span class="driver-name">${d.nome}</span>
                <span class="driver-detail">📱 ${d.whatsapp || '-'}</span>
              </div>
              <div class="driver-check"><i class="fas fa-check"></i></div>
            </div>
          `).join('')}
        </div>
        <div class="modal-actions" style="margin-top:16px;">
          <button class="btn btn-modal-cancel" id="driverModalCancel">Cancelar</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);

    let selectedId = null;
    overlay.querySelectorAll('.driver-option').forEach(el => {
      el.addEventListener('click', () => {
        overlay.querySelectorAll('.driver-option').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        selectedId = el.dataset.id;
        overlay.remove();
        resolve(selectedId);
      });
    });
    overlay.querySelector('#driverModalCancel').onclick = () => { overlay.remove(); resolve(null); };
    overlay.addEventListener('click', e => { if (e.target === overlay) { overlay.remove(); resolve(null); } });
  });
}

// --- Web Audio API beep system ---
let audioCtx = null;
let beepLoopId = null;
let beepInProg = false;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function beep(freq, duration, type) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'square';
    osc.frequency.value = freq || 880;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}

function tocarAlarmeNovoPedido() {
  beep(880, 0.2);
  setTimeout(function() { beep(880, 0.2); }, 250);
  setTimeout(function() { beep(880, 0.3); }, 500);
}

function beepLoop() {
  if (beepInProg) return;
  beepInProg = true;
  function tick() {
    beepLoopId = setTimeout(function() {
      beep(880, 0.5, 'sine');
      tick();
    }, 3000);
  }
  tick();
}

function pararBeepLoop() {
  if (beepLoopId) { clearTimeout(beepLoopId); beepLoopId = null; }
  beep(660, 0.15, 'sine');
  beepInProg = false;
}

document.addEventListener('click', function() {
  var ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
}, { once: true });

// --- polling + detection ---
let pendentesAnteriores = [];
let primeiraCarga = true;

async function carregarPedidos() {
  try {
    var pedidos = await api('/pedidos');
    Object.values(containers).forEach(function(c) { c.innerHTML = ''; });
    pedidos.forEach(function(p) {
      if (!p.status) return;
      var container = containers[p.status];
      if (!container) return;
      var card = renderCard(p, p.id);
      container.appendChild(card);
    });
    updateStats();
    atualizarBadgeEsteira();

    var pendentesAtuais = pedidos.filter(function(p) { return p.status === 'pendente'; });
    var novosIds = pendentesAtuais.filter(function(p) {
      return !pendentesAnteriores.some(function(a) { return a.id === p.id; });
    });

    if (novosIds.length > 0) {
      tocarAlarmeNovoPedido();
      var abaAtiva = document.querySelector('.tab.active');
      if (abaAtiva && abaAtiva.dataset.tab !== 'pendente') {
        var tabPendente = document.querySelector('.tab[data-tab="pendente"]');
        if (tabPendente) tabPendente.click();
      }
    }

    if (pendentesAtuais.length > 0 && !beepLoopId) beepLoop();
    else if (pendentesAtuais.length === 0 && beepLoopId) pararBeepLoop();

    pendentesAnteriores = pendentesAtuais;
    primeiraCarga = false;
  } catch(e) {
    console.error('Erro ao carregar pedidos:', e);
    toast('Erro ao carregar pedidos. Tentando novamente...', 'danger');
  }
}
carregarPedidos();
var pedidosTimer = setInterval(carregarPedidos, 10000);
</script>
