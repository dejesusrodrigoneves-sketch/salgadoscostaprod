<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-visual">
<meta charset="UTF-8">
<title>PDV - Caixa</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/balcao.css">
</head>

<body>

<div class="produtos-area">

  <div class="filtros" id="filtros"></div>

  <div class="grid-produtos"></div>

</div>

<div class="checkout">

  <h3>Resumo</h3>

 <div class="lista" id="lista-carrinho"></div>

  <div class="total-area">

<div class="entrega-opcoes">

  <label>
    <input type="radio" name="tipoEntrega" value="balcao" checked onchange="atualizarFormulario()">
    <span>Retirada / Balcão</span>
  </label>

  <label>
    <input type="radio" name="tipoEntrega" value="delivery" onchange="atualizarFormulario()">
    <span>Delivery</span>
  </label>

</div>


  <div id="form-informacoes">
    <!-- campos dinâmicos aqui -->
  </div>

</div>
    <div>
      <span>Total</span>
      <span class="total-final" id="total">R$ 0,00</span>
    </div>

    <button class="botao-pagar" onclick="pagar()">Finalizar Venda</button>
  </div>

</div>

<script src="js/utils.js"></script>
<script>
if(!authGuard()) throw new Error('Redirect');
</script>

<script>

//-----Nomes Front - End-------//

const nomesTipos = {
  1: "Salgados 45g",
  2: "Massas",
  3: "Combos",
  4: "Bebidas",
  5: "Doces",
  6: "Congelados"
};


let total = 0;
let todosProdutos = [];
let typeAtual = null;

// Carregar produtos via API
async function carregarProdutos() {
  try {
    var authUser = JSON.parse(localStorage.getItem('authUser') || '{}');
    var token = authUser.token || '';
    var res = await fetch('/api/produtos', { headers: token ? { 'Authorization': 'Bearer ' + token } : {} });
    if (!res.ok) throw new Error('Erro ao carregar produtos');
    todosProdutos = await res.json();
    todosProdutos = todosProdutos.filter(function(p) { return p.status === 'active'; });
  } catch(e) {
    console.error('Erro ao carregar produtos:', e);
    todosProdutos = [];
  }
  criarFiltros();
  renderizarProdutos();
}

// 🎈 Criar botões de filtro
function criarFiltros() {

  const filtrosDiv = document.getElementById("filtros");
  filtrosDiv.innerHTML = "";

  const types = [...new Set(todosProdutos.map(p => p.type))];

  // Botão Todos
  const btnTodos = document.createElement("button");
  btnTodos.innerText = "Todos";
  btnTodos.className = "filtro-btn ativo";
  btnTodos.onclick = () => {
    typeAtual = null;
    atualizarBotoes();
    renderizarProdutos();
  };
  filtrosDiv.appendChild(btnTodos);

  // Botões por type
  types.forEach(type => {
    const btn = document.createElement("button");
    btn.innerText = nomesTipos[type] || "Tipo " + type;
    btn.className = "filtro-btn";
    btn.onclick = () => {
      typeAtual = type;
      atualizarBotoes();
      renderizarProdutos();
    };
    btn.dataset.type = type;
    filtrosDiv.appendChild(btn);
  });

}

// Atualizar estilo do botão ativo
function atualizarBotoes() {
  document.querySelectorAll(".filtro-btn").forEach(btn => {
    btn.classList.remove("ativo");

    if (
      (btn.innerText === "Todos" && typeAtual === null) ||
      btn.dataset.type == typeAtual
    ) {
      btn.classList.add("ativo");
    }
  });
}

// 🧾 Renderizar produtos
function renderizarProdutos() {

  const grid = document.querySelector(".grid-produtos");
  grid.innerHTML = "";

  const produtosFiltrados = typeAtual
    ? todosProdutos.filter(p => p.type == typeAtual)
    : todosProdutos;

  produtosFiltrados.forEach(produto => {

    const div = document.createElement("div");
    div.className = "produto";

    div.innerHTML = `
      <img src="${produto.img || ''}" alt="${produto.name}" loading="lazy">
      <h4>${produto.name}</h4>
      <span>R$ ${Number(produto.price).toFixed(2)}</span>
    `;

div.addEventListener("click", () => {
  adicionarAoCarrinho(produto);
});

    grid.appendChild(div);

  });

}

window.addEventListener("DOMContentLoaded", carregarProdutos);


//----------======Formulario dinamico----------//

function atualizarFormulario() {
  const tipo = document.querySelector('input[name="tipoEntrega"]:checked').value;
  const div = document.getElementById("form-informacoes");

  let camposComuns = `
    <strong>Informações</strong><br>
    <input type="text" id="nomeCliente" aria-label="Nome do cliente" placeholder="Nome">
    <input type="number" id="whatsappCliente" aria-label="WhatsApp do cliente" placeholder="WhatsApp">
  `;

  let camposDelivery = `
    <input type="number" id="cepCliente" aria-label="CEP" placeholder="CEP">
    <input type="text" id="enderecoCliente" aria-label="Endereço" placeholder="Endereço">
    <input type="number" id="numeroCasa" aria-label="Número da casa" placeholder="Número da casa">
    <input type="text" id="bairroCliente" aria-label="Bairro" placeholder="Bairro">
    <input type="text" id="referenciaCliente" aria-label="Ponto de referência" placeholder="Ponto de referência">
  `;

  let pagamento = `
  <div class="pagamento-box">
    <strong>Forma de Pagamento</strong><br>
    <label><input type="radio" name="pagamento" value="dinheiro" checked onchange="calcularTotalFinal()"> Dinheiro</label>
    <label><input type="radio" name="pagamento" value="pix" onchange="calcularTotalFinal()"> Pix</label>
    <label><input type="radio" name="pagamento" value="debito" onchange="calcularTotalFinal()"> Cartão Débito (+2%)</label>
    <label><input type="radio" name="pagamento" value="credito" onchange="calcularTotalFinal()"> Cartão Crédito (+6%)</label>
  </div>
`;

  if (tipo === "delivery") {
    div.innerHTML = camposComuns + camposDelivery + pagamento;
  } else {
    div.innerHTML = camposComuns + pagamento;
  }

  calcularTotalFinal();
}

function abrirSeletorSabores(itemIndex) {
  const item = carrinho[itemIndex];

  // Total de sabores a selecionar
const produtoOriginal = todosProdutos.find(p => p.id === item.id);

const totalSabores = item.type === 6
  ? null
  : produtoOriginal?.quantidadeTotal || 1;

  // Filtra os sabores padrão (type 1)
  let saboresDisponiveis = todosProdutos.filter(p => p.type == 1 && p.id != 10);

  // Caso especial: congelados grandes (ID 402) adiciona sabor oculto
  if (item.id == 402) {
    const saborExtra = todosProdutos.find(p => p.id == 10);
    if (saborExtra) {
      saboresDisponiveis.push(saborExtra);
    }
  }

  // Mantém os sabores já selecionados, se houver
  let saboresSelecionados = item.sabores ? [...item.sabores] : [];

  // Criar modal
  const modal = document.createElement("div");
  modal.className = "modal-sabores";
  modal.innerHTML = `
    <div class="box-sabores">
      <h3>
  ${item.type === 6 
    ? "Escolha os sabores"
    : `Escolha os sabores (Total: ${totalSabores})`}
</h3>
      <div class="lista-sabores"></div>
      <p id="contadorTotal" style="margin:10px 0; font-weight:600; text-align:right;">
        Selecionados: ${saboresSelecionados.reduce((acc,s)=>acc+s.qtd,0)}/${totalSabores}
      </p>
      <button id="finalizarSabores" style="
        width:100%;
        padding:12px;
        border:none;
        border-radius:10px;
        background:#16a34a;
        color:white;
        font-weight:600;
        cursor:pointer;
        transition:0.2s;
      ">Finalizar</button>
    </div>
  `;
  document.body.appendChild(modal);

  const lista = modal.querySelector(".lista-sabores");
  const contadorTotal = modal.querySelector("#contadorTotal");

function atualizarContador() {
  const totalSelecionado = saboresSelecionados.reduce((acc, s) => acc + s.qtd, 0);

  // Para congelados type 6, mostra apenas total selecionado, sem limite
  contadorTotal.textContent = item.type === 6
    ? `Selecionados: ${totalSelecionado}`
    : `Selecionados: ${totalSelecionado}/${totalSabores}`;
}

  // Renderiza os sabores com input numérico
  saboresDisponiveis.forEach(sabor => {
    let qtd = saboresSelecionados.find(s => s.nome === sabor.name)?.qtd || 0;

    const div = document.createElement("div");
    div.className = "sabor-item";
    div.style.display = "flex";
    div.style.justifyContent = "space-between";
    div.style.alignItems = "center";
    div.style.padding = "8px 12px";
    div.style.marginBottom = "6px";
    div.style.border = "1px solid #e2e8f0";
    div.style.borderRadius = "10px";
    div.style.background = "#f8fafc";

    div.innerHTML = `
      <span>${sabor.name}</span>
      <input type="number" min="0" value="${qtd}" style="width:50px; text-align:center;">
    `;

    const inputQtd = div.querySelector("input");

    inputQtd.addEventListener("input", () => {
      let valor = parseInt(inputQtd.value) || 0;

      // Limitar ao total disponível
      const totalSelecionadoAtual = saboresSelecionados.reduce((acc, s) => acc + s.qtd, 0) - qtd;
     if (item.type !== 6 && totalSelecionadoAtual + valor > totalSabores) {
        valor = totalSabores - totalSelecionadoAtual;
        inputQtd.value = valor;
      }

      qtd = valor;

      const existente = saboresSelecionados.find(s => s.nome === sabor.name);
      if (existente) {
        existente.qtd = qtd;
        if (qtd === 0) {
          saboresSelecionados = saboresSelecionados.filter(s => s.nome !== sabor.name);
        }
      } else if (qtd > 0) {
        saboresSelecionados.push({ nome: sabor.name, qtd });
      }

      atualizarContador();
    });

    lista.appendChild(div);
  });

  modal.querySelector("#finalizarSabores").addEventListener("click", () => {
  const totalSelecionado = saboresSelecionados.reduce((acc, s) => acc + s.qtd, 0);

  if(item.type !== 6 && totalSelecionado !== totalSabores) {
    toast(`Você deve selecionar exatamente ${totalSabores} unidades.`, 'warning');
    return;
  }

  item.sabores = saboresSelecionados;

  // Para combos mantém 1, para congelados pega a soma
  if(item.type === 3){
    item.qtd = 1;
  } else if(item.type === 6){
    item.qtd = totalSelecionado; // ✅ aqui
  } else {
    item.qtd = totalSabores;
  }

  modal.remove();
  renderizarCarrinho();
});
}


// ===== CHECKOUT =====

function renderizarCarrinho() {
  const lista = document.getElementById("lista-carrinho");
  const totalSpan = document.getElementById("total");

  lista.innerHTML = "";

  if (carrinho.length === 0) {
    lista.innerHTML = '<div class="empty-cart-msg"><div class="icon">&#9744;</div><p>Carrinho vazio<br>Clique nos produtos acima</p></div>';
    document.getElementById("total").innerText = "R$ 0,00";
    return;
  }

  let total = 0;

  carrinho.forEach((item, index) => {
    total += item.preco * item.qtd;

    const div = document.createElement("div");
    div.classList.add("item-carrinho");

   div.innerHTML = `
  <div class="nome">
    ${item.nome}
    ${item.sabores && item.sabores.length > 0
      ? "<div style='font-size:12px;color:#64748b;margin-top:4px'>" +
          item.sabores.map(s =>
            typeof s === "string"
              ? s
              : `${s.nome} (${s.qtd})`
          ).join(", ") +
        "</div>"
      : ""}
  </div>

  <div class="controle-qtd">
    ${
      item.type === 3
        ? `<span>1</span>
           <div class="carrinho-botoes">
             <button class="btn-carrinho btn-editar" onclick="editarSabores(${index})">
               Editar
             </button>
             <button class="btn-carrinho btn-remover" onclick="removerItem(${index})">
               Excluir
             </button>
           </div>`
        : item.type === 6
        ? `<span>${item.qtd}</span>
           <div class="carrinho-botoes">
             <button class="btn-carrinho btn-editar" onclick="editarSabores(${index})">
               Editar
             </button>
             <button class="btn-carrinho btn-remover" onclick="removerItem(${index})">
               Excluir
             </button>
           </div>`
        : `<button class="btn-carrinho" onclick="diminuirQtd(${index})">−</button>
           <span>${item.qtd}</span>
           <button class="btn-carrinho" onclick="aumentarQtd(${index})">+</button>`
    }
  </div>

  <div class="subtotal">
    R$ ${(item.preco * item.qtd).toFixed(2)}
  </div>
`;

    lista.appendChild(div);
  });

 calcularTotalFinal();
}

function removerItem(index) {
  carrinho.splice(index, 1);
  renderizarCarrinho();
}

function editarSabores(index) {
  abrirSeletorSabores(index);
}

function aumentarQtd(index) {
  carrinho[index].qtd++;
  renderizarCarrinho();
}

function diminuirQtd(index) {
  carrinho[index].qtd--;

  if (carrinho[index].qtd <= 0) {
    carrinho.splice(index, 1);
  }

  renderizarCarrinho();
}

let carrinho = [];

function adicionarAoCarrinho(produto) {
  // Caso avulso
  if (produto.id == 209) {
    abrirSeletorAvulso(produto);
    return;
  }

  const existente = carrinho.find(p => p.id === produto.id);
  if (existente) {
    existente.qtd++;
    renderizarCarrinho();
    return;
  }

  carrinho.push({
    id: produto.id,
    nome: produto.name || produto.nome || "Produto",
    preco: Number(produto.price),
    qtd: produto.type === 3 ? 1 : produto.type === 6 ? 0 : produto.quantidadeTotal || 1,
    type: produto.type,
    sabores: []
  });

  const index = carrinho.length - 1;
  renderizarCarrinho();

  // Se for combo ou congelado → abre seletor normal
  if (produto.type === 3 || produto.type === 6) {
    abrirSeletorSabores(index);
  }
}

function abrirSeletorAvulso(produtoBase, indexCarrinho = null) {
  // No avulso, não há limite de quantidade total
  const totalSabores = produtoBase.quantidadeTotal || null;

  const saboresDisponiveis = todosProdutos.filter(p => p.type == 1 && !p.quantidadeLivre);

  let saboresSelecionados = indexCarrinho !== null
    ? [...carrinho[indexCarrinho].sabores]  // caso seja edição
    : [];

  const modal = document.createElement("div");
  modal.className = "modal-sabores";
  modal.innerHTML = `
    <div class="box-sabores">
      <h3>Escolha os sabores</h3>
      <div class="lista-sabores"></div>
      <p id="contadorTotal" style="margin:10px 0; font-weight:600; text-align:right;">Selecionados: 0</p>
      <button id="finalizarAvulso" style="
        width:100%;
        padding:12px;
        border:none;
        border-radius:10px;
        background:#16a34a;
        color:white;
        font-weight:600;
        cursor:pointer;
        transition:0.2s;
      ">Finalizar</button>
    </div>
  `;
  document.body.appendChild(modal);

  const lista = modal.querySelector(".lista-sabores");
  const contadorTotal = modal.querySelector("#contadorTotal");

  function atualizarContador() {
    const totalSelecionado = saboresSelecionados.reduce((acc, s) => acc + s.qtd, 0);
    contadorTotal.textContent = `Selecionados: ${totalSelecionado}`;
  }

  saboresDisponiveis.forEach(sabor => {
    let qtd = 0;
    if (indexCarrinho !== null) {
      const existente = saboresSelecionados.find(s => s.nome === sabor.name);
      qtd = existente ? existente.qtd : 0;
    }

    const div = document.createElement("div");
    div.className = "sabor-item";
    div.style.display = "flex";
    div.style.justifyContent = "space-between";
    div.style.alignItems = "center";
    div.style.padding = "8px 12px";
    div.style.marginBottom = "6px";
    div.style.border = "1px solid #e2e8f0";
    div.style.borderRadius = "10px";
    div.style.background = "#f8fafc";

    div.innerHTML = `
      <span>${sabor.name}</span>
      <input type="number" min="0" value="${qtd}" style="width:50px; text-align:center;">
    `;

    const inputQtd = div.querySelector("input");

    inputQtd.addEventListener("input", () => {
      let valor = parseInt(inputQtd.value) || 0;
      qtd = valor;

      const existente = saboresSelecionados.find(s => s.nome === sabor.name);
      if (existente) {
        existente.qtd = qtd;
        if (qtd === 0) {
          saboresSelecionados = saboresSelecionados.filter(s => s.nome !== sabor.name);
        }
      } else if (qtd > 0) {
        saboresSelecionados.push({ nome: sabor.name, qtd });
      }

      atualizarContador();
    });

    lista.appendChild(div);
  });

  modal.querySelector("#finalizarAvulso").addEventListener("click", () => {
    const totalSelecionado = saboresSelecionados.reduce((acc, s) => acc + s.qtd, 0);

    if (totalSelecionado === 0) {
      toast("Selecione pelo menos 1 unidade.", 'warning');
      return;
    }

    if (indexCarrinho !== null) {
      carrinho[indexCarrinho].sabores = saboresSelecionados;
      carrinho[indexCarrinho].qtd = totalSelecionado;
    } else {
      carrinho.push({
        id: produtoBase.id,
        nome: "Salgadinhos Avulsos",
        preco: produtoBase.price,
        qtd: totalSelecionado,
        type: produtoBase.type,
        sabores: saboresSelecionados
      });
    }

    modal.remove();
    renderizarCarrinho();
  });

  atualizarContador();
}



function calcularTotalFinal() {

  let subtotal = 0;

  carrinho.forEach(item => {
    subtotal += item.preco * item.qtd;
  });

  const formaPagamento = document.querySelector('input[name="pagamento"]:checked');

  let totalFinal = subtotal;

  if (formaPagamento) {
    if (formaPagamento.value === "debito") {
      totalFinal += subtotal * 0.02;
    }

    if (formaPagamento.value === "credito") {
      totalFinal += subtotal * 0.06;
    }
  }

  document.getElementById("total").innerText = 
    "R$ " + totalFinal.toFixed(2);
}

window.addEventListener("DOMContentLoaded", atualizarFormulario);

</script>
<script src="js/theme.js" defer></script>
</body>
</html>
