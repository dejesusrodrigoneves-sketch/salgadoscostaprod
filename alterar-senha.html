<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alterar Senha</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-visual">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/alterar-senha-page.css">
</head>
<body>

<div class="card">
  <h1><i class="fas fa-key"></i> Alterar Senha</h1>
  <p class="sub">Digite sua senha atual e a nova senha desejada</p>

  <form id="changePassForm">
    <div class="form-group">
      <label for="currentUser">Usuário</label>
      <input type="text" id="currentUser" readonly style="background:#f8fafc;color:#94a3b8;">
    </div>
    <div class="form-group">
      <label for="currentPass">Senha Atual</label>
      <input type="password" id="currentPass" placeholder="Sua senha atual" required>
    </div>
    <div class="form-group">
      <label for="newPass">Nova Senha</label>
      <input type="password" id="newPass" placeholder="Mínimo 6 caracteres" required>
    </div>
    <div class="form-group">
      <label for="newPass2">Confirmar Nova Senha</label>
      <input type="password" id="newPass2" placeholder="Repita a nova senha" required>
    </div>
    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Salvar</button>
    <div class="msg" id="msgBox"></div>
  </form>
</div>

<script src="js/utils.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
<script>
const authUser = JSON.parse(localStorage.getItem('authUser') || '{}');

if (!authUser.username || authUser.role === 'superadmin') {
  window.location.href = 'login.html';
}

document.getElementById('currentUser').value = authUser.username;

document.getElementById('changePassForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('msgBox');
  msg.className = 'msg';
  msg.textContent = '';

  const currentPass = document.getElementById('currentPass').value.trim();
  const newPass = document.getElementById('newPass').value.trim();
  const newPass2 = document.getElementById('newPass2').value.trim();

  if (!currentPass || !newPass) { showMsg('Preencha todos os campos', 'error'); return; }
  if (newPass.length < 6) { showMsg('Nova senha deve ter 6+ caracteres', 'error'); return; }
  if (newPass !== newPass2) { showMsg('Nova senha e confirmação não conferem', 'error'); return; }

  try {
    const snap = await db.collection('usuarios').where('username', '==', authUser.username).get();
    if (snap.empty) { showMsg('Usuário não encontrado', 'error'); return; }

    const doc = snap.docs[0];
    const data = doc.data();
    const match = await bcrypt.compare(currentPass, data.passwordHash);
    if (!match) { showMsg('Senha atual incorreta', 'error'); return; }

    const hash = await bcrypt.hash(newPass, 10);
    await db.collection('usuarios').doc(doc.id).update({ passwordHash: hash });

    showMsg('Senha alterada com sucesso!', 'success');
    document.getElementById('currentPass').value = '';
    document.getElementById('newPass').value = '';
    document.getElementById('newPass2').value = '';
  } catch (err) {
    console.error(err);
    showMsg('Erro ao alterar senha', 'error');
  }
});

function showMsg(text, type) {
  const msg = document.getElementById('msgBox');
  msg.textContent = text;
  msg.className = `msg show msg-${type}`;
}
</script>
<script src="js/theme.js" defer></script>
</body>
</html>
