<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Super Admin - Fábrica de Salgados</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-visual">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/superadmin-page.css">
</head>
<body>

<h1><i class="fas fa-shield-alt"></i> Super Admin</h1>

<div class="tabs">
  <button class="tab active" onclick="switchTab('usuarios',this)"><i class="fas fa-users"></i> Usuários</button>
  <button class="tab" onclick="switchTab('senhas',this)"><i class="fas fa-key"></i> Gerenciar Senhas</button>
  <button class="tab" onclick="switchTab('logs',this)"><i class="fas fa-history"></i> Histórico de Login</button>
</div>

<!-- Users tab -->
<div class="tab-content active" id="tabUsuarios">
  <div class="card">
    <h2><i class="fas fa-list"></i> Usuários Cadastrados</h2>
    <div style="overflow-x:auto">
    <table class="user-table">
      <thead><tr><th>Usuário</th><th>Papel</th><th>Loja</th><th>Criado em</th><th>Ações</th></tr></thead>
      <tbody id="userTableBody"></tbody>
    </table>
    </div>
  </div>
  <div class="card">
    <h2><i class="fas fa-plus-circle"></i> Cadastrar Novo Usuário</h2>
    <div style="max-width:400px;">
      <input type="text" id="newUsername" aria-label="Nome de usuário" placeholder="Nome de usuário">
      <input type="password" id="newPassword" aria-label="Senha" placeholder="Senha">
      <select id="newRole" aria-label="Papel do usuário">
        <option value="user">Usuário</option>
        <option value="admin">Administrador</option>
        <option value="superadmin">Super Admin</option>
      </select>
      <button class="btn btn-primary" onclick="cadastrarUsuario()"><i class="fas fa-user-plus"></i> Cadastrar</button>
    </div>
    <div class="toast" id="registerMsg" style="display:none;margin-top:10px;"></div>
  </div>
</div>

<!-- Passwords tab -->
<div class="tab-content" id="tabSenhas">
  <div class="card">
    <h2><i class="fas fa-exchange-alt"></i> Alterar Senha de Usuário</h2>
    <div style="max-width:400px;">
      <select id="userSelect" aria-label="Selecionar usuário"><option value="">Carregando...</option></select>
      <input type="password" id="newPassInput" aria-label="Nova senha" placeholder="Nova senha">
      <input type="password" id="newPassConfirm" aria-label="Confirmar nova senha" placeholder="Confirmar nova senha">
      <button class="btn btn-primary" onclick="alterarSenha()"><i class="fas fa-save"></i> Salvar</button>
    </div>
    <div class="toast" id="passMsg" style="display:none;margin-top:10px;"></div>
  </div>
</div>

<!-- Login Logs tab -->
<div class="tab-content" id="tabLogs">
  <div class="card">
    <h2><i class="fas fa-history"></i> Histórico de Login</h2>
    <div style="overflow-x:auto">
    <table class="user-table">
      <thead><tr><th>Usuário</th><th>IP</th><th>User-Agent</th><th>Data/Hora</th></tr></thead>
      <tbody id="logTableBody"></tbody>
    </table>
    </div>
  </div>
</div>

<!-- Empresas tab removida (single-tenant) -->

<div class="toast-container" id="toastContainer"></div>

<script src="js/utils.js"></script>
<script>
if(!authGuard()) throw new Error('Redirect');
function api(path, opts) {
  var headers = { 'Content-Type': 'application/json' };
  var token = (JSON.parse(localStorage.getItem('authUser') || '{}')).token;
  if (token) headers['Authorization'] = 'Bearer ' + token;
  return fetch('/api' + path, { headers: headers, ...opts }).then(function(r) {
    if (!r.ok) return r.json().then(function(e) { throw new Error(e.error || 'Erro ' + r.status); });
    return r.json();
  });
}
</script>

<script>
function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  const map = { usuarios: 'tabUsuarios', senhas: 'tabSenhas', empresas: 'tabEmpresas', logs: 'tabLogs' };
  document.getElementById(map[tab]).classList.add('active');
  if (tab === 'logs') carregarLogs();
}

// Load users via API
async function carregarUsuarios() {
  const tbody = document.getElementById('userTableBody');
  const select = document.getElementById('userSelect');
  select.innerHTML = '<option value="">Selecione um usuário</option>';
  try {
    const usuarios = await api('/usuarios');
    if (!usuarios || usuarios.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="color:#94a3b8;text-align:center;">Nenhum usuário cadastrado</td></tr>';
      return;
    }
      tbody.innerHTML = '';
    var roleLabels = { superadmin: 'Super Admin', admin: 'Admin', user: 'Usuário' };
    usuarios.forEach(function(u) {
      var roleClass = u.role === 'superadmin' ? ' style="color:#f97316;font-weight:700;"' : '';
      tbody.innerHTML += '<tr><td><strong>' + u.username + '</strong></td><td' + roleClass + '>' + (roleLabels[u.role] || u.role) + '</td><td>' + (u.lojaNome || '-') + '</td><td>' + (u.createdAt ? new Date(u.createdAt).toLocaleDateString('pt-BR') : '-') + '</td><td><button class="btn btn-danger btn-sm" aria-label="Excluir usuário ' + u.username + '" onclick="excluirUsuario(' + u.id + ',\'' + u.username + '\')"><i class="fas fa-trash"></i></button></td></tr>';
      select.innerHTML += '<option value="' + u.id + '" data-user="' + u.username + '">' + u.username + '</option>';
    });
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="4" style="color:#94a3b8;text-align:center;">Erro ao carregar usuários</td></tr>';
  }
}

async function cadastrarUsuario() {
  const username = document.getElementById('newUsername').value.trim();
  const password = document.getElementById('newPassword').value.trim();
  const role = document.getElementById('newRole').value;
  if (!username || !password) { toast('Preencha todos os campos', 'danger'); return; }
  if (password.length < 6) { toast('Senha deve ter 6+ caracteres', 'danger'); return; }
  if (role === 'superadmin' && !(await confirmModal('ATENÇÃO: você está criando um Super Admin com acesso total ao sistema. Confirma?'))) return;
  try {
    await api('/usuarios', { method: 'POST', body: JSON.stringify({ username, password, lojaNome: username, role }) });
    document.getElementById('newUsername').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('newRole').value = 'user';
    toast('Usuário ' + username + ' cadastrado!');
    carregarUsuarios();
  } catch(e) {
    toast(e.message || 'Erro ao cadastrar', 'danger');
  }
}

async function excluirUsuario(id, username) {
  if (!(await confirmModal('Excluir usuário ' + username + '?'))) return;
  try {
    await api('/usuarios/' + id, { method: 'DELETE' });
    toast('Usuário ' + username + ' removido', 'danger');
    carregarUsuarios();
  } catch(e) {
    toast('Erro ao remover', 'danger');
  }
}

async function alterarSenha() {
  const select = document.getElementById('userSelect');
  const pass = document.getElementById('newPassInput').value.trim();
  const pass2 = document.getElementById('newPassConfirm').value.trim();
  if (!select.value) { toast('Selecione um usuário', 'danger'); return; }
  if (!pass || pass.length < 6) { toast('Senha deve ter 6+ caracteres', 'danger'); return; }
  if (pass !== pass2) { toast('Senhas não conferem', 'danger'); return; }
  try {
    await api('/usuarios/' + select.value + '/password', { method: 'PUT', body: JSON.stringify({ password: pass }) });
    document.getElementById('newPassInput').value = '';
    document.getElementById('newPassConfirm').value = '';
    toast('Senha alterada com sucesso!');
  } catch(e) {
    toast(e.message || 'Erro ao alterar senha', 'danger');
  }
}

async function carregarLogs() {
  const tbody = document.getElementById('logTableBody');
  try {
    const logs = await api('/usuarios/logs');
    if (!logs || logs.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="color:#94a3b8;text-align:center;">Nenhum login registrado</td></tr>';
      return;
    }
    tbody.innerHTML = '';
    logs.forEach(function(l) {
      const ua = l.userAgent ? l.userAgent.substring(0, 80) : '-';
      const data = l.loggedAt ? new Date(l.loggedAt).toLocaleString('pt-BR') : '-';
      tbody.innerHTML += '<tr><td>' + l.username + '</td><td>' + (l.ip || '-') + '</td><td style="font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + escapeHtml(l.userAgent || '') + '">' + escapeHtml(ua) + '</td><td>' + data + '</td></tr>';
    });
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="4" style="color:#94a3b8;text-align:center;">Erro ao carregar logs</td></tr>';
  }
}

carregarUsuarios();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
<script src="js/theme.js" defer></script>
</body>
</html>
