<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title id="dashboardTitle">Dashboard - Fabrica de salgados Costa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --sidebar-bg: #0f172a;
  --sidebar-hover: #1e293b;
  --accent: #f97316;
  --accent-hover: #ea580c;
  --text-light: #f8fafc;
  --text-muted: #94a3b8;
  --bg: #f1f5f9;
  --card-bg: #ffffff;
  --border: #e2e8f0;
  --success: #16a34a;
  --danger: #dc2626;
  --warning: #f59e0b;
}

html, body {
  height: 100%;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  overflow: hidden;
}

.app {
  display: flex;
  height: 100vh;
  width: 100%;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 260px;
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s ease;
  z-index: 1000;
  position: relative;
  flex-shrink: 0;
}

.sidebar-header {
  padding: 24px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  gap: 12px;
}

.sidebar-header .logo-icon {
  width: 40px;
  height: 40px;
  background: var(--accent);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: white;
  flex-shrink: 0;
}

.sidebar-header h2 {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-light);
  line-height: 1.3;
}

.sidebar-header h2 small {
  display: block;
  font-weight: 400;
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 12px 8px;
}

.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }

.nav-section {
  margin-bottom: 8px;
}

.nav-section-title {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  padding: 12px 16px 6px;
  opacity: 0.6;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  border-radius: 10px;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.2s ease;
  font-size: 14px;
  font-weight: 500;
  position: relative;
  user-select: none;
}

.nav-item:hover {
  background: var(--sidebar-hover);
  color: var(--text-light);
}

.nav-item.active {
  background: rgba(249, 115, 22, 0.12);
  color: var(--accent);
}

.nav-item i {
  width: 20px;
  text-align: center;
  font-size: 16px;
  flex-shrink: 0;
}

.nav-item .badge {
  margin-left: auto;
  background: var(--accent);
  color: white;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  min-width: 20px;
  text-align: center;
}

/* Submenu */
.nav-group .submenu {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}

.nav-group.open .submenu {
  max-height: 200px;
}

.submenu-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px 8px 48px;
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s ease;
  border-radius: 8px;
}

.submenu-item:hover {
  color: var(--text-light);
  background: var(--sidebar-hover);
}

.submenu-item.active {
  color: var(--accent);
}

.nav-item .arrow {
  margin-left: auto;
  font-size: 10px;
  transition: transform 0.3s ease;
}

.nav-group.open .nav-item .arrow {
  transform: rotate(180deg);
}

/* ===== MAIN ===== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  background: white;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.mobile-toggle {
  display: none;
  background: none;
  border: none;
  font-size: 20px;
  color: var(--sidebar-bg);
  cursor: pointer;
  padding: 4px;
}

.topbar h1 {
  font-size: 18px;
  font-weight: 700;
  color: #0f172a;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.topbar-right .user-info {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 500;
}

.btn-logout {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: white;
  color: var(--danger);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-logout:hover {
  background: #fef2f2;
  border-color: var(--danger);
}

.content {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.content iframe {
  width: 100%;
  height: 100%;
  border: none;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.content iframe.loaded {
  opacity: 1;
}

/* Loading overlay for iframe */
.page-loader {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  z-index: 10;
  transition: opacity 0.3s ease;
  pointer-events: none;
}

.page-loader.hidden {
  opacity: 0;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.page-loader p {
  margin-top: 16px;
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 500;
}

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center; z-index: 10000;
  animation: modalFade 0.2s ease;
}
@keyframes modalFade { from { opacity:0; } to { opacity:1; } }
.modal-box {
  background: white; border-radius: 12px; padding: 28px; max-width: 400px; width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: modalSlide 0.2s ease;
}
@keyframes modalSlide { from { transform: scale(0.95); opacity:0; } to { transform: scale(1); opacity:1; } }
.modal-box h3 { font-size:16px; margin-bottom:8px; }
.modal-box p { font-size:13px; color:#64748b; margin-bottom:20px; line-height:1.5; }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; }
.btn-modal-confirm { padding:8px 16px; background:#f97316; color:white; border:none; border-radius:8px; font-weight:600; cursor:pointer; font-family:inherit; font-size:13px; }
.btn-modal-confirm:hover { background:#ea580c; }
.btn-modal-cancel { padding:8px 16px; background:#f1f5f9; color:#64748b; border:none; border-radius:8px; font-weight:500; cursor:pointer; font-family:inherit; font-size:13px; }
.btn-modal-cancel:hover { background:#e2e8f0; }

/* ===== NOTIFICATION ===== */
.notif-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-width: 360px;
}

.notif-item {
  padding: 12px 16px;
  border-radius: 12px;
  color: white;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  animation: slideIn 0.3s ease;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
}

.notif-item.notif-pedido { background: var(--accent); }
.notif-item.notif-estoque { background: var(--danger); }

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    height: 100%;
    transform: translateX(-100%);
    width: 280px;
  }
  .sidebar.open {
    transform: translateX(0);
  }
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 999;
  }
  .sidebar-overlay.active {
    display: block;
  }
  .mobile-toggle {
    display: block;
  }
  .topbar {
    padding: 12px 16px;
  }
  .topbar h1 {
    font-size: 16px;
  }
  .notif-container {
    left: 16px;
    right: 16px;
    bottom: 16px;
    max-width: none;
  }
}
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar overlay for mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon"><i class="fas fa-utensils"></i></div>
      <h2 id="sidebarStoreName">Salgados Costa <small>Painel Administrativo</small></h2>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <!-- Sections rendered by JS -->
    </nav>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-toggle" onclick="toggleSidebar()" aria-label="Abrir menu">
          <i class="fas fa-bars"></i>
        </button>
        <h1 id="pageTitle">Pedidos</h1>
      </div>
      <div class="topbar-right">
        <span class="user-info" id="userInfo"><i class="fas fa-user-circle"></i> Admin</span>
        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
      </div>
    </header>

    <div class="content">
      <div class="page-loader" id="pageLoader">
        <div class="spinner"></div>
        <p>Carregando...</p>
      </div>
      <iframe id="mainFrame" src="admin.html"></iframe>
    </div>
  </div>
</div>

<!-- Notification container -->
<div class="notif-container" id="notifContainer"></div>

<script>
// Auth guard
const authUser = JSON.parse(localStorage.getItem('authUser') || 'null');
if (!authUser) { window.location.href = 'login.html'; }

const sidebarNav = document.getElementById('sidebarNav');
const mainFrame = document.getElementById('mainFrame');
const pageLoader = document.getElementById('pageLoader');
const pageTitle = document.getElementById('pageTitle');
let notifCount = 0;
let currentPage = 'admin.html';

// Use URL param to detect superadmin access
const urlParams = new URLSearchParams(window.location.search);
const isSuperAdmin = authUser.role === 'superadmin' || urlParams.get('superadmin') === 'true';

const menuSections = [
  {
    title: 'Principal',
    items: [
      { icon: 'fa-box', label: 'Pedidos', page: 'admin.html' },
      { icon: 'fa-cash-register', label: 'Lançar Pedido', page: 'balcao.html' },
      { icon: 'fa-store', label: 'Painel Loja', page: 'painelLoja.html' },
    ]
  },
  {
    title: 'Financeiro',
    items: [
      { icon: 'fa-chart-bar', label: 'Relatórios', page: 'relatorios.html' },
      { icon: 'fa-wallet', label: 'Controle de Caixa', page: 'caixa.html' },
    ]
  },
  {
    title: 'Entregas',
    items: [
      { icon: 'fa-truck', label: 'Entregadores', page: 'entregador.html' },
    ]
  },
  {
    title: 'Integrações',
    items: [
      { icon: 'fab fa-whatsapp', label: 'WhatsApp', page: 'whatsapp.html' },
    ]
  }
];

// Super Admin section
if (isSuperAdmin) {
  menuSections.push({
    title: 'Administração',
    items: [
      { icon: 'fa-users-cog', label: 'Gerenciar Usuários', page: 'superadmin.html' },
      { icon: 'fa-key', label: 'Trocar Senhas', page: 'superadmin.html?tab=senhas' },
    ]
  });
} else {
  menuSections.push({
    title: 'Conta',
    items: [
      { icon: 'fa-key', label: 'Alterar Senha', page: 'alterar-senha.html' },
    ]
  });
}

function renderMenu() {
  sidebarNav.innerHTML = '';
  menuSections.forEach(section => {
    const sectionDiv = document.createElement('div');
    sectionDiv.className = 'nav-section';
    sectionDiv.innerHTML = `<div class="nav-section-title">${section.title}</div>`;
    section.items.forEach(item => {
      const isActive = item.page === currentPage;
      const div = document.createElement('div');
      div.className = `nav-item${isActive ? ' active' : ''}`;
      div.dataset.page = item.page;
      div.innerHTML = `<i class="fas ${item.icon}"></i><span>${item.label}</span>`;
      if (item.page === 'admin.html') {
        div.innerHTML += `<span class="badge" id="pedidoBadge" style="display:none">0</span>`;
      }
      div.addEventListener('click', () => navigate(item.page, div));
      sectionDiv.appendChild(div);
    });
    sidebarNav.appendChild(sectionDiv);
  });
}

function navigate(page, element) {
  if (page === currentPage) return;
  currentPage = page;

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  if (element) element.classList.add('active');

  pageTitle.textContent = element ? element.querySelector('span')?.textContent || 'Dashboard' : 'Dashboard';

  pageLoader.classList.remove('hidden');
  mainFrame.style.opacity = '0';

  setTimeout(() => {
    mainFrame.src = page;
    mainFrame.onload = () => {
      mainFrame.style.opacity = '1';
      pageLoader.classList.add('hidden');
    };
  }, 200);

  closeSidebar();
}

mainFrame.onload = () => {
  mainFrame.style.opacity = '1';
  pageLoader.classList.add('hidden');
};

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('active');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('active');
}

// Show user info
const userName = authUser.username || 'Admin';
const roleBadge = isSuperAdmin ? 'Super Admin' : 'Usuário';
document.getElementById('userInfo').innerHTML = `<i class="fas fa-user-circle"></i> ${userName} <span style="font-size:10px;color:#94a3b8;font-weight:400;">(${roleBadge})</span>`;

// If super admin detected, persist to localStorage
if (isSuperAdmin && authUser.role !== 'superadmin') {
  localStorage.setItem('authUser', JSON.stringify({ username: 'djesus', role: 'superadmin', _expiry: Date.now() + 86400000 }));
}

function logout() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <h3>Sair</h3>
      <p>Deseja realmente sair do painel?</p>
      <div class="modal-actions">
        <button class="btn btn-modal-cancel" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
        <button class="btn btn-modal-confirm" id="confirmLogout">Sair</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#confirmLogout').onclick = () => {
    localStorage.clear();
    window.location.href = 'login.html';
  };
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

// Listen for messages from iframes
window.addEventListener('message', function(event) {
  if (event.origin !== window.location.origin) return;
  if (event.data.tipo === 'atualizarBadge') {
    const badge = document.getElementById('pedidoBadge');
    badge.textContent = event.data.total;
    badge.style.display = event.data.total > 0 ? 'inline-block' : 'none';

    if (event.data.novoPedido) {
      showNotification('pedido', 'Novo pedido recebido!', () => {
        const navItem = document.querySelector('.nav-item[data-page="admin.html"]');
        navigate('admin.html', navItem);
      });
    }
  }
  if (event.data.tipo === 'estoqueBaixo') {
    showNotification('estoque', `Estoque baixo: ${event.data.produto}`, () => {
      const navItem = document.querySelector('.nav-item[data-page="painelLoja.html"]');
      navigate('painelLoja.html', navItem);
    });
  }
});

function showNotification(type, message, action) {
  const container = document.getElementById('notifContainer');
  const div = document.createElement('div');
  div.className = `notif-item notif-${type}`;
  div.textContent = message;
  if (action) {
    div.addEventListener('click', action);
  }
  container.appendChild(div);
  setTimeout(() => {
    div.style.opacity = '0';
    div.style.transition = 'opacity 0.3s';
    setTimeout(() => div.remove(), 300);
  }, 5000);
}

async function carregarNomeLoja() {
  try {
    const authUser = JSON.parse(localStorage.getItem('authUser') || '{}');
    const token = authUser.token;
    if (!token) return;
    const res = await fetch('/api/loja/settings-admin', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!res.ok) return;
    const config = await res.json();
    const nome = config.nome || 'Salgados Costa';
    const titleEl = document.getElementById('dashboardTitle');
    if (titleEl) titleEl.textContent = 'Dashboard - ' + nome;
    const sideEl = document.getElementById('sidebarStoreName');
    if (sideEl) sideEl.innerHTML = nome + ' <small>Painel Administrativo</small>';
  } catch (e) {
    // Keep default name
  }
}
carregarNomeLoja();
renderMenu();
</script>

</body>
</html>
