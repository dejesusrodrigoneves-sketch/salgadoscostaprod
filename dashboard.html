<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title id="dashboardTitle">Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-visual">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/dashboard-page.css">

</head>
<body>

<div class="app">
  <!-- Sidebar overlay for mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon"><i class="fas fa-utensils"></i></div>
      <h2 id="sidebarStoreName"><small>Painel Administrativo</small></h2>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <!-- Sections rendered by JS -->
    </nav>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-toggle" onclick="toggleSidebar()" aria-label="Abrir menu">
          <i class="fas fa-bars"></i>
        </button>
        <h1 id="pageTitle">Pedidos</h1>
      </div>
      <div class="topbar-right">
        <span class="user-info" id="userInfo"><i class="fas fa-user-circle"></i> Admin</span>
        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
      </div>
    </header>

    <div class="content">
      <div class="page-loader" id="pageLoader">
        <div class="spinner"></div>
        <p>Carregando...</p>
      </div>
      <iframe id="mainFrame" src="admin.html"></iframe>
    </div>
  </div>
</div>

<!-- Notification container -->
<div class="notif-container" id="notifContainer"></div>

<script>
// Auth guard
const authUser = JSON.parse(localStorage.getItem('authUser') || 'null');
if (!authUser) { window.location.href = 'login.html'; }

const sidebarNav = document.getElementById('sidebarNav');
const mainFrame = document.getElementById('mainFrame');
const pageLoader = document.getElementById('pageLoader');
const pageTitle = document.getElementById('pageTitle');
let notifCount = 0;
let currentPage = 'admin.html';

const role = authUser.role || 'user';

const menuSections = [
  {
    title: 'Principal',
    items: [
      { icon: 'fa-box', label: 'Pedidos', page: 'admin.html' },
      { icon: 'fa-cash-register', label: 'Lançar Pedido', page: 'balcao.html' },
    ]
  }
];

// Admin+ sections
if (role === 'admin' || role === 'superadmin') {
  menuSections.push(
    {
      title: 'Financeiro',
      items: [
        { icon: 'fa-chart-bar', label: 'Relatórios', page: 'relatorios.html' },
        { icon: 'fa-wallet', label: 'Controle de Caixa', page: 'caixa.html' },
      ]
    },
    {
      title: 'Entregas',
      items: [
        { icon: 'fa-truck', label: 'Entregadores', page: 'entregador.html' },
      ]
    },
    {
      title: 'Painel',
      items: [
        { icon: 'fa-store', label: 'Painel Loja', page: 'painelLoja.html' },
      ]
    }
  );
}

// Todos veem Integrações (WhatsApp)
menuSections.push({
  title: 'Integrações',
  items: [
    { icon: 'fab fa-whatsapp', label: 'WhatsApp', page: 'whatsapp.html' },
  ]
});

// Super Admin section
if (role === 'superadmin') {
  menuSections.push({
    title: 'Administração',
    items: [
      { icon: 'fa-users-cog', label: 'Gerenciar Usuários', page: 'superadmin.html' },
      { icon: 'fa-key', label: 'Trocar Senhas', page: 'superadmin.html?tab=senhas' },
    ]
  });
} else {
  menuSections.push({
    title: 'Conta',
    items: [
      { icon: 'fa-key', label: 'Alterar Senha', page: 'alterar-senha.html' },
    ]
  });
}

function renderMenu() {
  sidebarNav.innerHTML = '';
  menuSections.forEach(section => {
    const sectionDiv = document.createElement('div');
    sectionDiv.className = 'nav-section';
    sectionDiv.innerHTML = `<div class="nav-section-title">${section.title}</div>`;
    section.items.forEach(item => {
      const isActive = item.page === currentPage;
      const div = document.createElement('div');
      div.className = `nav-item${isActive ? ' active' : ''}`;
      div.dataset.page = item.page;
      div.innerHTML = `<i class="fas ${item.icon}"></i><span>${item.label}</span>`;
      if (item.page === 'admin.html') {
        div.innerHTML += `<span class="badge" id="pedidoBadge" style="display:none">0</span>`;
      }
      div.addEventListener('click', () => navigate(item.page, div));
      sectionDiv.appendChild(div);
    });
    sidebarNav.appendChild(sectionDiv);
  });
}

function navigate(page, element) {
  if (page === currentPage) return;
  currentPage = page;

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  if (element) element.classList.add('active');

  pageTitle.textContent = element ? element.querySelector('span')?.textContent || 'Dashboard' : 'Dashboard';

  pageLoader.classList.remove('hidden');
  mainFrame.style.opacity = '0';

  setTimeout(() => {
    mainFrame.src = page;
    mainFrame.onload = () => {
      mainFrame.style.opacity = '1';
      pageLoader.classList.add('hidden');
    };
  }, 200);

  closeSidebar();
}

mainFrame.onload = () => {
  mainFrame.style.opacity = '1';
  pageLoader.classList.add('hidden');
};

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('active');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('active');
}

// Show user info
const userName = authUser.username || 'Admin';
const roleLabels = { superadmin: 'Super Admin', admin: 'Admin', user: 'Usuário' };
const roleBadge = roleLabels[role] || 'Usuário';
document.getElementById('userInfo').innerHTML = '<i class=\"fas fa-user-circle\"></i> ' + userName + ' <span style=\"font-size:10px;color:#94a3b8;font-weight:400;\">(' + roleBadge + ')</span>';

function logout() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <h3>Sair</h3>
      <p>Deseja realmente sair do painel?</p>
      <div class="modal-actions">
        <button class="btn btn-modal-cancel" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
        <button class="btn btn-modal-confirm" id="confirmLogout">Sair</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#confirmLogout').onclick = () => {
    localStorage.clear();
    window.location.href = 'login.html';
  };
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

// Listen for messages from iframes
window.addEventListener('message', function(event) {
  if (event.origin !== window.location.origin) return;
  if (event.data.tipo === 'atualizarBadge') {
    const badge = document.getElementById('pedidoBadge');
    badge.textContent = event.data.total;
    badge.style.display = event.data.total > 0 ? 'inline-block' : 'none';

    if (event.data.novoPedido) {
      showNotification('pedido', 'Novo pedido recebido!', () => {
        const navItem = document.querySelector('.nav-item[data-page="admin.html"]');
        navigate('admin.html', navItem);
      });
    }
  }
  if (event.data.tipo === 'estoqueBaixo') {
    showNotification('estoque', `Estoque baixo: ${event.data.produto}`, () => {
      const navItem = document.querySelector('.nav-item[data-page="painelLoja.html"]');
      navigate('painelLoja.html', navItem);
    });
  }
});

function showNotification(type, message, action) {
  const container = document.getElementById('notifContainer');
  const div = document.createElement('div');
  div.className = `notif-item notif-${type}`;
  div.textContent = message;
  if (action) {
    div.addEventListener('click', action);
  }
  container.appendChild(div);
  setTimeout(() => {
    div.style.opacity = '0';
    div.style.transition = 'opacity 0.3s';
    setTimeout(() => div.remove(), 300);
  }, 5000);
}

async function carregarNomeLoja() {
  try {
    const authUser = JSON.parse(localStorage.getItem('authUser') || '{}');
    const token = authUser.token;
    if (!token) return;
    const res = await fetch('/api/loja/settings-admin', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!res.ok) return;
    const config = await res.json();
    const nome = config.nome || 'Salgados Costa';
    const titleEl = document.getElementById('dashboardTitle');
    if (titleEl) titleEl.textContent = 'Dashboard - ' + nome;
    const sideEl = document.getElementById('sidebarStoreName');
    if (sideEl) sideEl.innerHTML = nome + ' <small>Painel Administrativo</small>';
  } catch (e) {
    // Keep default name
  }
}
carregarNomeLoja();
renderMenu();
</script>
<script src="js/theme.js" defer></script>
</body>
</html>
