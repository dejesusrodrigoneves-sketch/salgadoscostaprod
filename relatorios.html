<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Relatórios - Fabrica de salgados Costa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-visual">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/utils.js"></script>
<script>
if(!authGuard()) throw new Error('Redirect');
var _au = JSON.parse(localStorage.getItem('authUser') || '{}');
if(!_au.role || !['admin','superadmin'].includes(_au.role)) { window.location.href = 'dashboard.html'; }
</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/relatorios-page.css">
</head>
<body>

<h1><i class="fas fa-chart-bar"></i> Relatórios de Pedidos</h1>

<div class="tabs">
  <button class="tab-btn active" onclick="abrirAba(event,'abaResumo')"><i class="fas fa-calendar-day"></i> Resumo do Dia</button>
  <button class="tab-btn" onclick="abrirAba(event,'abaPeriodo')"><i class="fas fa-calendar-alt"></i> Relatório por Período</button>
</div>

<div id="abaResumo" class="tab-content active">
  <div class="card">
    <div style="overflow-x:auto">
    <table>
      <thead>
        <tr><th>Data</th><th>Total Pedidos</th><th>Finalizados</th><th>Valor Total (R$)</th></tr>
      </thead>
      <tbody id="relatoriosTabela">
        <tr><td colspan="4" style="color:#94a3b8;">Carregando...</td></tr>
      </tbody>
    </table>
    </div>
  </div>
  <div class="grafico-container">
    <h3><i class="fas fa-chart-bar"></i> Faturamento Diário</h3>
    <canvas id="graficoFaturamentoDia" height="100"></canvas>
  </div>
</div>

<div id="abaPeriodo" class="tab-content">
  <div class="card">
    <h2 style="font-size:16px;margin-bottom:16px;">📅 Relatório por Período</h2>
    <div class="filtro-datas">
      <label>De <input type="date" id="dataInicio"></label>
      <label>Até <input type="date" id="dataFim"></label>
      <button onclick="carregarRelatoriosPeriodo()"><i class="fas fa-filter"></i> Filtrar</button>
    </div>
    <div id="resumoPeriodo" class="resumo-periodo"></div>
  </div>

  <div class="grafico-container" id="graficoPeriodoContainer" style="display:none;">
    <h3>Faturamento do Período</h3>
    <canvas id="graficoFaturamentoPeriodo" height="100"></canvas>
  </div>

  <div id="relatoriosPeriodo" style="margin-top:12px;">
    <p style="color:#94a3b8;font-size:13px;">Selecione um período para visualizar os relatórios.</p>
  </div>
</div>

<script>
function abrirAba(evt, abaId){
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(abaId).classList.add('active');
  evt.currentTarget.classList.add('active');
}

const tabela = document.getElementById('relatoriosTabela');
const ctxDia = document.getElementById('graficoFaturamentoDia').getContext('2d');
let graficoDia;
var relTimer = null;

function carregarRelatoriosDia() {
  var token = (JSON.parse(localStorage.getItem('authUser') || '{}')).token || '';
  fetch('/api/pedidos', { headers: token ? { 'Authorization': 'Bearer ' + token } : {} }).then(function(r) { return r.json(); }).then(function(pedidos) {
    let dadosPorDia = {};
    const hojeStr = new Date().toLocaleDateString('pt-BR');
    pedidos.forEach(function(p) {
      if (!p.createdAt) return;
      var d = new Date(p.createdAt);
      var diaStr = d.toLocaleDateString('pt-BR');
      if (!dadosPorDia[diaStr]) dadosPorDia[diaStr] = { totalPedidos: 0, finalizados: 0, valorTotal: 0 };
      dadosPorDia[diaStr].totalPedidos++;
      dadosPorDia[diaStr].valorTotal += Number(p.total) || 0;
      if (p.status === 'finalizado') dadosPorDia[diaStr].finalizados++;
    });
    tabela.innerHTML = '';
    let labels = [], valores = [];
    for (let dia in dadosPorDia) {
      let d = dadosPorDia[dia];
      if (dia === hojeStr) {
        tabela.innerHTML += '<tr><td>' + dia + '</td><td>' + d.totalPedidos + '</td><td>' + d.finalizados + '</td><td>' + d.valorTotal.toFixed(2).replace('.',',') + '</td></tr>';
      }
      labels.push(dia);
      valores.push(d.valorTotal);
    }
    if (!tabela.innerHTML) tabela.innerHTML = '<tr><td colspan="4" style="color:#94a3b8;">Nenhum pedido hoje</td></tr>';
    if (graficoDia) graficoDia.destroy();
    graficoDia = new Chart(ctxDia, {
      type: 'bar',
      data: { labels: labels, datasets: [{ label: 'Valor total (R$)', data: valores, backgroundColor: '#f97316', borderRadius: 4 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(c) { return 'R$ ' + c.raw.toFixed(2).replace('.', ','); } } } }, scales: { y: { beginAtZero: true } } }
    });
  }).catch(function(e) { console.error('Erro carregar relatorios:', e); });
}
carregarRelatoriosDia();
relTimer = setInterval(carregarRelatoriosDia, 30000);

const ctxPeriodo = document.getElementById('graficoFaturamentoPeriodo').getContext('2d');
let graficoPeriodo;

function carregarRelatoriosPeriodo(){
  const inicio = document.getElementById('dataInicio').value;
  const fim = document.getElementById('dataFim').value;
  const container = document.getElementById('relatoriosPeriodo');
  const resumoDiv = document.getElementById('resumoPeriodo');
  const graficoContainer = document.getElementById('graficoPeriodoContainer');
  container.innerHTML = '<p style="color:#94a3b8;">Carregando...</p>';
  resumoDiv.innerHTML = '';
  graficoContainer.style.display = 'none';

  if (!inicio || !fim) { container.innerHTML = '<p style="color:#94a3b8;">Selecione um período válido.</p>'; return; }

  var token = (JSON.parse(localStorage.getItem('authUser') || '{}')).token || '';
  var url = '/api/pedidos?createdAtFrom=' + encodeURIComponent(inicio + 'T00:00:00') + '&createdAtTo=' + encodeURIComponent(fim + 'T23:59:59') + '&order=asc';
  fetch(url, { headers: token ? { 'Authorization': 'Bearer ' + token } : {} }).then(function(r) { return r.json(); }).then(function(pedidos) {
    if (!pedidos || pedidos.length === 0) { container.innerHTML = '<p style="color:#94a3b8;">Nenhum pedido encontrado nesse período.</p>'; return; }

    let pedidosPorDia = {}, totaisPorDia = {}, totalPeriodo = 0;
    pedidos.forEach(function(p) {
      if (!p.createdAt) return;
      var d = new Date(p.createdAt);
      var diaStr = d.toLocaleDateString('pt-BR');
      if (!pedidosPorDia[diaStr]) { pedidosPorDia[diaStr] = []; totaisPorDia[diaStr] = 0; }
      let valor = Number(p.total) || 0;
      totalPeriodo += valor;
      totaisPorDia[diaStr] += valor;
      pedidosPorDia[diaStr].push({ nome: p.clienteNome || 'Desconhecido', whatsapp: p.clienteWhatsapp || 'Não informado', valor: valor });
    });

    resumoDiv.innerHTML = 'Total no per\u00edodo: R$ ' + totalPeriodo.toFixed(2).replace('.', ',');

    container.innerHTML = '';
    let labelsPeriodo = [], valoresPeriodo = [];
    for (let dia in pedidosPorDia) {
      const pedidosHTML = pedidosPorDia[dia].map(function(p) {
        return '<div class="pedido-card"><strong>Cliente:</strong> ' + p.nome + '<br><strong>WhatsApp:</strong> ' + p.whatsapp + '<br><strong>Valor:</strong> R$ ' + p.valor.toFixed(2).replace('.', ',') + '</div>';
      }).join('');
      container.innerHTML += '<div class="dia-relatorio"><h3>' + dia + ' — Total: R$ ' + totaisPorDia[dia].toFixed(2).replace('.', ',') + '</h3>' + pedidosHTML + '</div>';
      labelsPeriodo.push(dia);
      valoresPeriodo.push(totaisPorDia[dia]);
    }

    graficoContainer.style.display = 'block';
    if (graficoPeriodo) graficoPeriodo.destroy();
    graficoPeriodo = new Chart(ctxPeriodo, {
      type: 'bar',
      data: { labels: labelsPeriodo, datasets: [{ label: 'Valor diário (R$)', data: valoresPeriodo, backgroundColor: '#f97316', borderRadius: 4 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(c) { return 'R$ ' + c.raw.toFixed(2).replace('.', ','); } } } }, scales: { y: { beginAtZero: true } } }
    });
  }).catch(function(e) { container.innerHTML = '<p style="color:#94a3b8;">Erro ao carregar: ' + e.message + '</p>'; });
}
</script>
<script src="js/theme.js" defer></script>
</body>
</html>
