<style>

}

.sidebar h2 { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }

.subtitle { font-size: 12px; color: #64748b; }

.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; }

.btn {
  padding: 10px 16px; border: none; border-radius: 8px; font-weight: 600; font-size: 13px;
  cursor: pointer; font-family: inherit; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: #f97316; color: white; }
.btn-primary:hover { background: #ea580c; }
.btn-danger { background: #dc2626; color: white; }
.btn-danger:hover { background: #b91c1c; }
.btn-success { background: #16a34a; color: white; }
.btn-success:hover { background: #15803d; }
.btn-ghost { background: #1e293b; color: #94a3b8; }
.btn-ghost:hover { background: #334155; color: #f8fafc; }
.btn-sm { padding: 6px 12px; font-size: 11px; }

.driver-list { display: flex; flex-direction: column; gap: 8px; }
.driver-card {
  background: #1e293b; border-radius: 10px; padding: 12px;

}
.driver-card.inactive { opacity: 0.5; }
.driver-card h4 { font-size: 14px; font-weight: 600; }

.badge-active { background: rgba(22,163,74,0.15); color: #4ade80; }
.badge-inactive { background: rgba(100,116,139,0.2); color: #94a3b8; }

/* Daily report */
.report-box {
  background: #1e293b; border-radius: 10px; padding: 12px; margin-top: 8px;
}
.report-box .row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.report-box .row:last-child { border: none; }
.report-box .name { font-weight: 500; }
.report-box .value { color: #4ade80; font-weight: 600; }

/* Main content */
.main { flex: 1; display: flex; flex-direction: column; }

.topbar {

  padding: 16px 24px; background: white; border-bottom: 1px solid #e2e8f0;
}
.topbar h1 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.tab-group { display: flex; gap: 4px; }
.tab-btn {

  font-size: 13px; font-weight: 500; cursor: pointer; transition: 0.2s; font-family: inherit;
}

<div class="app">

        <p style="font-size:12px;color:#64748b;">Nenhuma entrega hoje</p>

  </aside>

 

  

    <!-- Tab: History -->

<script>
const MAPBOX_TOKEN = "";
const WEBSOCKET_SERVER = "wss://costasalgados-1.onrender.com";
const authUser = JSON.parse(localStorage.getItem('authUser') || 'null');
const entregadorId = authUser ? 'entregador_' + (authUser.empresaId || 1) + '_' + (authUser.id || '0') : 'entregador725';
const API_BASE = window.location.origin + '/api';
const TOKEN = authUser?.token || localStorage.getItem('token') || '';

const wsUrl = WEBSOCKET_SERVER + '?entregadorId=' + entregadorId;

async function apiRequest(path, options = {}) {
  const url = API_BASE + path;
  const headers = { 'Content-Type': 'application/json', ...options.headers };
  if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
  const res = await fetch(url, { ...options, headers });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: 'Erro na requisição' }));
    throw new Error(err.error || 'Erro HTTP ' + res.status);
  }
  return res.json();
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(tab === 'tracking' ? 'tabTracking' : 'tabHistory').classList.add('active');
  if (tab === 'history') carregarHistorico();
}

// ========== CRUD Entregadores ==========

let editandoEntregadorId = null;

async function salvarEntregador() {
  const nome = document.getElementById('inpNome').value.trim();
  const endereco = document.getElementById('inpEndereco').value.trim();
  const whatsapp = document.getElementById('inpWhatsapp').value.trim();
  const chavePix = document.getElementById('inpPix').value.trim();

  if (!nome) { toast('Nome é obrigatório', 'danger'); return; }

  try {
    if (editandoEntregadorId) {
      // Editar via backend API
      await apiRequest('/entregadores/' + editandoEntregadorId, {
        method: 'PUT', body: JSON.stringify({ nome, endereco, whatsapp, chavePix, ativo: true })
      });
      toast('Entregador atualizado!');
    } else {
      // Criar via backend API (fallback Firestore)
      try {
        await apiRequest('/entregadores', {
          method: 'POST',
          body: JSON.stringify({ nome, endereco, whatsapp, chavePix, ativo: true })
        });
      } catch(e) { toast('Erro ao cadastrar entregador', 'danger'); return; }
      toast('Entregador cadastrado!');
    }
  } catch (e) {
    toast(e.message || 'Erro ao salvar', 'danger');
    return;
  }

  document.getElementById('inpNome').value = '';
  document.getElementById('inpEndereco').value = '';
  document.getElementById('inpWhatsapp').value = '';
  document.getElementById('inpPix').value = '';
  editandoEntregadorId = null;
  document.querySelector('#sidebar h3').textContent = 'Cadastrar Entregador';
}

function editarEntregador(id, nome, endereco, whatsapp, chavePix) {
  document.getElementById('inpNome').value = nome;
  document.getElementById('inpEndereco').value = endereco || '';
  document.getElementById('inpWhatsapp').value = whatsapp || '';
  document.getElementById('inpPix').value = chavePix || '';
  editandoEntregadorId = id;
  document.querySelector('#sidebar h3').textContent = 'Editar Entregador';
  toast('Editando entregador', 'info');
}

async function toggleAtivo(id, ativo) {
  try {
    await apiRequest('/entregadores/' + id + '/toggle', {
      method: 'PATCH', body: JSON.stringify({ ativo })
    });
  } catch(e) { toast('Erro ao alterar status', 'danger'); return; }
  toast(ativo ? 'Entregador ativado' : 'Entregador desativado');
}

async function excluirEntregador(id) {
  if (!(await confirmModal('Excluir este entregador?'))) return;
  try {
    await apiRequest('/entregadores/' + id, { method: 'DELETE' });
  } catch(e) { toast('Erro ao excluir entregador', 'danger'); return; }
  toast('Entregador removido', 'danger');
}

async function carregarEntregadores() {
  const list = document.getElementById('driverList');
  let entregadores = [];

  try {
    entregadores = await apiRequest('/entregadores?sort=criadoEm');
  } catch(e) {}

  if (!entregadores.length) {
    list.innerHTML = '<p style="font-size:12px;color:#64748b;">Nenhum entregador cadastrado</p>';
    return;
  }

  list.innerHTML = entregadores.map(d => {
    const id = d.id;
    const nome = d.nome;
    const ativo = d.ativo !== false;
    return `
      <div class="driver-card ${ativo ? '' : 'inactive'}">
        <h4>${nome} <span class="badge ${ativo ? 'badge-active' : 'badge-inactive'}">${ativo ? 'Ativo' : 'Inativo'}</span></h4>
        <div class="info">
          ${d.endereco ? `<span>📍 ${d.endereco}</span>` : ''}
          ${d.whatsapp ? `<span>📱 ${d.whatsapp}</span>` : ''}
          ${d.chavePix ? `<span>💳 Pix: ${d.chavePix}</span>` : ''}
        </div>
        <div class="actions">
          <button class="btn btn-sm btn-ghost" onclick="editarEntregador('${id}', '${nome.replace(/'/g, "\\'")}', '${(d.endereco||'').replace(/'/g, "\\'")}', '${(d.whatsapp||'').replace(/'/g, "\\'")}', '${(d.chavePix||'').replace(/'/g, "\\'")}')"><i class="fas fa-pen"></i></button>
          <button class="btn btn-sm ${ativo ? 'btn-ghost' : 'btn-success'}" onclick="toggleAtivo('${id}', ${!ativo})">
            ${ativo ? 'Desativar' : 'Ativar'}
          </button>
          <button class="btn btn-sm btn-danger" onclick="excluirEntregador('${id}')"><i class="fas fa-trash"></i></button>
        </div>
      </div>`;
  }).join('');
}

// Poll drivers periodically
setInterval(carregarEntregadores, 15000);
carregarEntregadores();

// ========== Resumo do Dia ==========

async function carregarResumoDia() {
  const hoje = new Date().toISOString().split('T')[0];
  const box = document.getElementById('dailyReport');
  try {
    const resumo = await apiRequest('/entregas/resumo?data=' + hoje);
    if (!resumo.entregadores || resumo.entregadores.length === 0) {
      box.innerHTML = '<p style="font-size:12px;color:#64748b;">Nenhuma entrega hoje</p>';
      return;
    }
    var html = resumo.entregadores.map(function(e) {
      return '<div class="row"><span class="name">' + (e.entregadorNome || e.entregadorId) + '</span><span class="value">' + e.totalEntregas + ' entregas — R$ ' + (e.totalValor || 0).toFixed(2) + '</span></div>';
    }).join('');
    box.innerHTML = html;
  } catch(e) {
    box.innerHTML = '<p style="font-size:12px;color:#64748b;">Erro ao carregar resumo</p>';
  }
}

// ========== MAPA E RASTREAMENTO ==========

let map;
async function initMap() {
  try {
    const cfg = await fetch('/api/config').then(r => r.json());
    mapboxgl.accessToken = cfg.mapboxToken;
    MAPBOX_TOKEN = cfg.mapboxToken;
  } catch(e) { console.error('Erro ao carregar config:', e); }
  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/streets-v12',
    center: [-43.373775, -22.717847],
    zoom: 13
  });
}
initMap();

let markerEntregador = null, markerCliente = null;
let pedidoId = null, destinoCliente = null;
let geoWatchId = null, rotaCoords = [];
let ultimaRotaAtualizada = 0;
const TEMPO_MIN_RECALCULO = 20000;
const TOLERANCIA_DESVIO = 0.0008;

const ws = new WebSocket(wsUrl);
const statusSpan = document.getElementById('status');
ws.onopen = () => statusSpan.textContent = '🟢 Conectado';
ws.onclose = () => statusSpan.textContent = '🔴 Desconectado';
ws.onerror = () => statusSpan.textContent = '⚠️ Erro de conexão';

function enviarWS(dados) {
  if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(dados));
  else ws.addEventListener('open', () => ws.send(JSON.stringify(dados)), { once: true });
}

async function carregarPedidos() {
  const select = document.getElementById('pedidoSelect');
  select.innerHTML = '<option value="">Carregando...</option>';
  try {
    const pedidos = await apiRequest('/pedidos?status=aceito,producao,pronto,emRota');
    if (!pedidos || pedidos.length === 0) { select.innerHTML = '<option value="">Nenhum pedido pendente</option>'; return; }
    select.innerHTML = '<option value="">Selecione um pedido</option>';
    pedidos.forEach(function(p) {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.id.slice(-6) + ' - ' + (p.clienteNome || 'Cliente');
      select.appendChild(opt);
    });
  } catch (e) {
    console.error(e);
    select.innerHTML = '<option value="">Erro ao carregar</option>';
  }
}

async function calcularRotaGH(origem, destino) {
  try {
    const url = `/api/proxy/graphhopper?path=/route&point=${origem.lat},${origem.lng}&point=${destino.lat},${destino.lng}&vehicle=car&points_encoded=false`;
    const res = await fetch(url).catch(() => {
      // Fallback: chama GraphHopper diretamente
      return fetch(`https://graphhopper.com/api/1/route?point=${origem.lat},${origem.lng}&point=${destino.lat},${destino.lng}&vehicle=car&points_encoded=false&key=${GRAPHHOPPER_KEY}`);
    });
    const data = await res.json();
    if (!data.paths?.length) return;
    rotaCoords = data.paths[0].points.coordinates;
    if (map.getSource('rota')) {
      map.getSource('rota').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: rotaCoords } });
    } else {
      map.addSource('rota', { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: rotaCoords } } });
      map.addLayer({ id: 'rota', type: 'line', source: 'rota', paint: { 'line-color': '#2196f3', 'line-width': 5 } });
    }
  } catch (e) { console.error('Erro rota:', e); }
}

function smoothMove(marker, target, duration = 1000) {
  if (!marker) return;
  const start = marker.getLngLat();
  const startTime = performance.now();
  function animate(time) {
    const t = Math.min((time - startTime) / duration, 1);
    marker.setLngLat([start.lng + (target.lng - start.lng) * t, start.lat + (target.lat - start.lat) * t]);
    if (t < 1) requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
}

function distanciaPontoLinha(ponto, linha) {
  let minDist = Infinity;
  for (let i = 0; i < linha.length - 1; i++) {
    const [x1, y1] = linha[i], [x2, y2] = linha[i + 1];
    const px = ponto.lng, py = ponto.lat;
    const dx = x2 - x1, dy = y2 - y1;
    const t = ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy);
    let nx, ny;
    if (t < 0) { nx = x1; ny = y1; }
    else if (t > 1) { nx = x2; ny = y2; }
    else { nx = x1 + t * dx; ny = y1 + t * dy; }
    minDist = Math.min(minDist, Math.sqrt((px - nx) ** 2 + (py - ny) ** 2));
  }
  return minDist;
}

function startGeolocation() {
  if (!navigator.geolocation) return toast('Geolocalização não suportada', 'danger');
  geoWatchId = navigator.geolocation.watchPosition(async pos => {
    const { latitude, longitude } = pos.coords;
    if (!markerEntregador) {
      markerEntregador = new mapboxgl.Marker({ color: '#ff5722' }).setLngLat([longitude, latitude]).addTo(map);
    } else smoothMove(markerEntregador, { lat: latitude, lng: longitude }, 500);
    map.setCenter([longitude, latitude]);
    const agora = Date.now();
    if (rotaCoords.length && distanciaPontoLinha({ lat: latitude, lng: longitude }, rotaCoords) > TOLERANCIA_DESVIO && (agora - ultimaRotaAtualizada > TEMPO_MIN_RECALCULO)) {
      ultimaRotaAtualizada = agora;
      await calcularRotaGH({ lat: latitude, lng: longitude }, destinoCliente);
    }
    enviarWS({ tipo: 'atualizacao_localizacao', entregadorId, pedidoId, latitude, longitude, timestamp: agora });
    if (pedidoId) {
      try { apiRequest('/entregas', { method: 'POST', body: JSON.stringify({ entregadorId: Number(entregadorId), pedidoId, valor: 0 }) }); } catch(e) {}
    }
  }, err => console.error('Erro GPS:', err), { enableHighAccuracy: true });
}

document.getElementById('btnIniciar').onclick = async function() {
  const select = document.getElementById('pedidoSelect');
  pedidoId = select.value;
  if (!pedidoId) return toast('Selecione um pedido', 'warning');

  var pedidoAtual = await apiRequest('/pedidos/' + pedidoId);
  const endereco = (pedidoAtual.clienteEndereco || '') + ' ' + (pedidoAtual.clienteNumero || '') + ', ' + (pedidoAtual.clienteBairro || '') + ', Belford Roxo, RJ';
  const geoRes = await fetch(`/api/proxy/mapbox?path=/geocoding/v5/mapbox.places/${encodeURIComponent(endereco)}.json`);
  const geoData = await geoRes.json();
  if (!geoData.features?.length) return toast('Endereço não encontrado', 'danger');
  const [lng, lat] = geoData.features[0].center;
  destinoCliente = { lat, lng };

  if (!markerCliente) markerCliente = new mapboxgl.Marker({ color: '#4caf50' }).setLngLat([lng, lat]).addTo(map);
  else markerCliente.setLngLat([lng, lat]);

  const pos = await new Promise(res => navigator.geolocation.getCurrentPosition(p => res({ lat: p.coords.latitude, lng: p.coords.longitude })));
  await calcularRotaGH(pos, destinoCliente);
  startGeolocation();
  statusSpan.textContent = `🚚 Corrida: ${pedidoId.slice(-6)}`;
  window.open(`https://www.google.com/maps?q=${destinoCliente.lat},${destinoCliente.lng}`, '_blank');
};

document.getElementById('btnFinalizar').onclick = async () => {
  if (!pedidoId) return toast('Nenhum pedido em andamento', 'warning');
  if (!(await confirmModal('Finalizar entrega?'))) return;
  if (geoWatchId != null) navigator.geolocation.clearWatch(geoWatchId);
  await apiRequest('/pedidos/' + pedidoId + '/finalizar', { method: 'POST' });
  try { await apiRequest('/entregas/' + pedidoId, { method: 'DELETE' }); } catch(e) {}
  enviarWS({ tipo: 'entrega_finalizada', entregadorId, pedidoId });

  // Registrar no resumo do dia via API
  try {
    var pedidoFinalizado = await apiRequest('/pedidos/' + pedidoId);
    var valorEntrega = Number(pedidoFinalizado.total) || 0;
    await apiRequest('/entregas', { method: 'POST', body: JSON.stringify({ entregadorId: Number(entregadorId), pedidoId, valor: valorEntrega }) });
  } catch(e) {}

  pedidoId = null; destinoCliente = null; rotaCoords = [];
  statusSpan.textContent = '✅ Finalizada';
  markerCliente?.remove(); markerCliente = null;
  markerEntregador?.remove(); markerEntregador = null;
  carregarPedidos();
  carregarResumoDia();
};

// ========== Histórico ==========

async function carregarHistorico() {
  const container = document.getElementById('historyContent');
  const hoje = new Date().toISOString().split('T')[0];
  try {
    const resumo = await apiRequest('/entregas/resumo?data=' + hoje);
    if (!resumo.entregadores || resumo.entregadores.length === 0) {
      container.innerHTML = '<p style="color:#94a3b8;">Nenhuma entrega registrada hoje.</p>';
      return;
    }
    let html = '<div class="report-box" style="background:white;border:1px solid #e2e8f0;">';
    resumo.entregadores.forEach(function(r) {
      html += '<div class="row"><span class="name">' + (r.entregadorNome || r.entregadorId) + '</span><span class="value">' + r.totalEntregas + ' entregas — R$ ' + (r.totalValor || 0).toFixed(2) + '</span></div>';
    });
    html += '</div>';
  container.innerHTML = html;
}

// ========== INIT ==========
carregarPedidos();
carregarResumoDia();
</script>
</body>
</html>
