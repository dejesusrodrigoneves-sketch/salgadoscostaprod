<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Entregadores - Fabrica de salgados Costa</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-visual">

<script src="js/utils.js"></script>
<script>
if(!authGuard()) throw new Error('Redirect');
var _au = JSON.parse(localStorage.getItem('authUser') || '{}');
if(!_au.role || !['admin','superadmin'].includes(_au.role)) { window.location.href = 'dashboard.html'; }
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/entregador-page.css">
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="app">
  <!-- Sidebar - Gerenciamento de Entregadores -->
  <aside class="sidebar">
    <h2><i class="fas fa-motorcycle"></i> Entregadores</h2>

    <div>
      <h3>Cadastrar Entregador</h3>
      <div class="form-group">
        <label>Nome Completo</label>
        <input type="text" id="inpNome" placeholder="Nome do entregador">
      </div>
      <div class="form-group">
        <label>Endereço</label>
        <input type="text" id="inpEndereco" placeholder="Endereço">
      </div>
      <div class="form-group">
        <label>WhatsApp</label>
        <input type="text" id="inpWhatsapp" placeholder="21999999999">
      </div>
      <div class="form-group">
        <label>Chave Pix</label>
        <input type="text" id="inpPix" placeholder="CPF, telefone ou e-mail">
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:4px;" onclick="salvarEntregador()">
        <i class="fas fa-plus"></i> Cadastrar
      </button>
    </div>

    <div>
      <h3>Entregadores Ativos</h3>
      <div class="driver-list" id="driverList"></div>
    </div>

    <div>
      <h3>Resumo do Dia</h3>
      <div class="report-box" id="dailyReport">
        <p style="font-size:12px;color:#64748b;">Nenhuma entrega hoje</p>
      </div>
    </div>
  </aside>

</div>

<script>
const authUser = JSON.parse(localStorage.getItem('authUser') || 'null');
const API_BASE = window.location.origin + '/api';
const TOKEN = authUser?.token || localStorage.getItem('token') || '';

async function apiRequest(path, options = {}) {
  const url = API_BASE + path;
  const headers = { 'Content-Type': 'application/json', ...options.headers };
  if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
  const res = await fetch(url, { ...options, headers });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: 'Erro na requisição' }));
    throw new Error(err.error || 'Erro HTTP ' + res.status);
  }
  return res.json();
}

// ========== CRUD Entregadores ==========

let editandoEntregadorId = null;

async function salvarEntregador() {
  const nome = document.getElementById('inpNome').value.trim();
  const endereco = document.getElementById('inpEndereco').value.trim();
  const whatsapp = document.getElementById('inpWhatsapp').value.trim();
  const chavePix = document.getElementById('inpPix').value.trim();

  if (!nome) { toast('Nome é obrigatório', 'danger'); return; }

  try {
    if (editandoEntregadorId) {
      await apiRequest('/entregadores/' + editandoEntregadorId, {
        method: 'PUT', body: JSON.stringify({ nome, endereco, whatsapp, chavePix, ativo: true })
      });
      toast('Entregador atualizado!');
    } else {
      try {
        await apiRequest('/entregadores', {
          method: 'POST',
          body: JSON.stringify({ nome, endereco, whatsapp, chavePix, ativo: true })
        });
      } catch(e) { toast('Erro ao cadastrar entregador', 'danger'); return; }
      toast('Entregador cadastrado!');
    }
  } catch (e) {
    toast(e.message || 'Erro ao salvar', 'danger');
    return;
  }

  document.getElementById('inpNome').value = '';
  document.getElementById('inpEndereco').value = '';
  document.getElementById('inpWhatsapp').value = '';
  document.getElementById('inpPix').value = '';
  editandoEntregadorId = null;
  document.querySelector('.sidebar h3').textContent = 'Cadastrar Entregador';
}

function editarEntregador(id, nome, endereco, whatsapp, chavePix) {
  document.getElementById('inpNome').value = nome;
  document.getElementById('inpEndereco').value = endereco || '';
  document.getElementById('inpWhatsapp').value = whatsapp || '';
  document.getElementById('inpPix').value = chavePix || '';
  editandoEntregadorId = id;
  document.querySelector('.sidebar h3').textContent = 'Editar Entregador';
  toast('Editando entregador', 'info');
}

async function toggleAtivo(id, ativo) {
  try {
    await apiRequest('/entregadores/' + id + '/toggle', {
      method: 'PATCH', body: JSON.stringify({ ativo })
    });
  } catch(e) { toast('Erro ao alterar status', 'danger'); return; }
  toast(ativo ? 'Entregador ativado' : 'Entregador desativado');
}

async function excluirEntregador(id) {
  if (!(await confirmModal('Excluir este entregador?'))) return;
  try {
    await apiRequest('/entregadores/' + id, { method: 'DELETE' });
  } catch(e) { toast('Erro ao excluir entregador', 'danger'); return; }
  toast('Entregador removido', 'danger');
}

async function carregarEntregadores() {
  const list = document.getElementById('driverList');
  let entregadores = [];

  try {
    entregadores = await apiRequest('/entregadores?sort=criadoEm');
  } catch(e) {}

  if (!entregadores.length) {
    list.innerHTML = '<p style="font-size:12px;color:#64748b;">Nenhum entregador cadastrado</p>';
    return;
  }

  list.innerHTML = entregadores.map(d => {
    const id = d.id;
    const nome = d.nome;
    const ativo = d.ativo !== false;
    return `
      <div class="driver-card ${ativo ? '' : 'inactive'}">
        <h4>${nome} <span class="badge ${ativo ? 'badge-active' : 'badge-inactive'}">${ativo ? 'Ativo' : 'Inativo'}</span></h4>
        <div class="info">
          ${d.endereco ? `<span>\ud83d\udccd ${d.endereco}</span>` : ''}
          ${d.whatsapp ? `<span>\ud83d\udcf1 ${d.whatsapp}</span>` : ''}
          ${d.chavePix ? `<span>\ud83d\udcb3 Pix: ${d.chavePix}</span>` : ''}
        </div>
        <div class="actions">
          <button class="btn btn-sm btn-ghost" aria-label="Editar entregador" onclick="editarEntregador('${id}', '${nome.replace(/'/g, "\\'")}', '${(d.endereco||'').replace(/'/g, "\\'")}', '${(d.whatsapp||'').replace(/'/g, "\\'")}', '${(d.chavePix||'').replace(/'/g, "\\'")}')"><i class="fas fa-pen"></i></button>
          <button class="btn btn-sm ${ativo ? 'btn-ghost' : 'btn-success'}" onclick="toggleAtivo('${id}', ${!ativo})">
            ${ativo ? 'Desativar' : 'Ativar'}
          </button>
          <button class="btn btn-sm btn-danger" aria-label="Excluir entregador" onclick="excluirEntregador('${id}')"><i class="fas fa-trash"></i></button>
        </div>
      </div>`;
  }).join('');
}

// ========== Resumo do Dia ==========

async function carregarResumoDia() {
  const hoje = new Date().toISOString().split('T')[0];
  const box = document.getElementById('dailyReport');
  try {
    const resumo = await apiRequest('/entregas/resumo?data=' + hoje);
    if (!resumo.entregadores || resumo.entregadores.length === 0) {
      box.innerHTML = '<p style="font-size:12px;color:#64748b;">Nenhuma entrega hoje</p>';
      return;
    }
    const html = resumo.entregadores.map(function(e) {
      return '<div class="row"><span class="name">' + (e.entregadorNome || e.entregadorId) + '</span><span class="value">' + e.totalEntregas + ' entregas \u2014 R$ ' + (e.totalValor || 0).toFixed(2) + '</span></div>';
    }).join('');
    box.innerHTML = html;
  } catch(e) {
    box.innerHTML = '<p style="font-size:12px;color:#64748b;">Erro ao carregar resumo</p>';
  }
}

// Poll drivers and resumo
setInterval(carregarEntregadores, 15000);
setInterval(carregarResumoDia, 30000);
carregarEntregadores();
carregarResumoDia();
</script>
<script src="js/theme.js" defer></script>
</body>
</html>
