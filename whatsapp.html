<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>WhatsApp - Fabrica de salgados Costa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-visual">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/whatsapp-page.css">
</head>
<body>
<div class="page-header">
  <i class="fab fa-whatsapp"></i>
  <h1>Integração WhatsApp</h1>
</div>

<div id="instancesContainer">
  <div class="card">
    <div class="empty-state">
      <i class="fas fa-wifi"></i>
      <p>Carregando...</p>
    </div>
  </div>
</div>

<div id="qrContainer"></div>

<div class="toast-container" id="toastContainer"></div>

<div class="criar-modal-overlay" id="criarModal">
  <div class="criar-modal-content">
    <h3><i class="fas fa-plus-circle" style="color:#25d366;"></i> Criar Instância WhatsApp</h3>
    <input id="inputInstanceName" type="text" aria-label="Nome da instância" placeholder="Nome da instância (ex: WhatsApp Matriz)" />
    <input id="inputPhoneNumber" type="text" aria-label="Número da loja" placeholder="Número da loja (ex: 5511999999999)" />
    <div class="criar-modal-actions">
      <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarCriacao()">Criar</button>
    </div>
  </div>
</div>

<script src="js/utils.js"></script>
<script>
const API = window.location.origin + '/api';
const authUser = JSON.parse(localStorage.getItem('authUser') || 'null');
if (!authUser) window.location.href = 'login.html';

const TOKEN = authUser.token || '';

async function apiRequest(path, options = {}) {
  const url = API + path;
  const headers = { 'Content-Type': 'application/json', ...options.headers };
  if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
  const res = await fetch(url, { ...options, headers });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: 'Erro na requisição' }));
    throw new Error(err.error || 'Erro');
  }
  return res.json();
}

function toast(msg, type = 'success') {
  const c = document.getElementById('toastContainer');
  const d = document.createElement('div');
  d.className = 'toast toast-' + type;
  d.textContent = msg;
  d.onclick = () => d.remove();
  c.appendChild(d);
  setTimeout(() => { d.style.opacity = '0'; d.style.transition = 'opacity 0.3s'; setTimeout(() => d.remove(), 300); }, 4000);
}

function statusHtml(status) {
  const map = {
    connected: ['Conectado', 'status-connected'],
    disconnected: ['Desconectado', 'status-disconnected'],
    qrcode: ['Aguardando pareamento', 'status-qrcode'],
    reconnecting: ['Reconectando', 'status-reconnecting'],
    open: ['Conectado', 'status-connected'],
    close: ['Desconectado', 'status-disconnected'],
    connecting: ['Conectando', 'status-qrcode'],
  };
  const [label, cls] = map[status] || [status, 'status-disconnected'];
  return `<span class="status-badge ${cls}"><i class="fas fa-circle"></i> ${label}</span>`;
}

function isConectada(status) {
  return status === 'connected' || status === 'open';
}

async function carregarInstancias() {
  try {
    const instancias = await apiRequest('/whatsapp');
    const container = document.getElementById('instancesContainer');

    if (!instancias.length) {
      container.innerHTML = `
        <div class="info-box">
          <i class="fas fa-info-circle"></i>
          Conecte o WhatsApp da sua loja para receber notificações automaticas de pedidos.
        </div>
        <div class="card">
          <div class="empty-state">
            <i class="fab fa-whatsapp"></i>
            <p>Nenhuma instância WhatsApp configurada.</p>
            <p style="font-size:12px;color:#94a3b8;margin-top:4px;">Crie uma instância para conectar o WhatsApp da loja.</p>
            <button class="btn btn-primary" style="margin-top:16px;" onclick="criarInstancia()">
              <i class="fas fa-plus"></i> Criar Instância
            </button>
          </div>
        </div>`;
      return;
    }

    const inst = instancias[0];
    const conectada = isConectada(inst.connectionStatus);

    container.innerHTML = `
      <div class="info-box">
        <i class="fas fa-info-circle"></i>
        ${conectada
          ? 'WhatsApp conectado. Notificações de pedidos serão enviadas automaticamente para os clientes.'
          : 'Conecte o WhatsApp escaneando o QR Code abaixo. As notificações só funcionam quando a instância estiver conectada.'}
      </div>
      <div class="card">
        <div class="instance-card">
          <div class="instance-header">
            <div>
              <div class="name">${inst.instanceId}</div>
              <div class="instance-detail">
                ${inst.phoneNumber
                  ? '<i class="fas fa-phone"></i> <strong>' + inst.phoneNumber + '</strong>'
                  : '<i class="fas fa-phone-slash"></i> Número não registrado'}
              </div>
            </div>
            ${statusHtml(inst.connectionStatus)}
          </div>
          <div class="actions">
            ${!conectada ? `
              <button class="btn btn-sm btn-primary" onclick="gerarQR('${inst.id}')">
                <i class="fas fa-qrcode"></i> Obter QR Code
              </button>
              <button class="btn btn-sm btn-ghost" onclick="reconectar('${inst.id}')">
                <i class="fas fa-sync"></i> Reconectar
              </button>
            ` : `
              <button class="btn btn-sm btn-test" onclick="enviarTeste('${inst.id}')">
                <i class="fas fa-paper-plane"></i> Enviar Teste
              </button>
              <button class="btn btn-sm btn-ghost" onclick="atualizarStatus('${inst.id}')">
                <i class="fas fa-sync"></i> Atualizar
              </button>
            `}
            <button class="btn btn-sm btn-danger" onclick="excluirInstancia('${inst.id}')">
              <i class="fas fa-trash"></i> Deletar
            </button>
          </div>
        </div>
      </div>`;

    const qrContainer = document.getElementById('qrContainer');
    if (conectada) {
      qrContainer.innerHTML = '';
    } else if (!qrContainer.innerHTML) {
      qrContainer.innerHTML = `
        <div class="card qr-box">
          <div class="empty-state">
            <i class="fas fa-qrcode"></i>
            <p>Nenhum QR Code ativo. Clique em "Gerar QR Code" para conectar.</p>
          </div>
        </div>`;
    }
  } catch (e) {
    document.getElementById('instancesContainer').innerHTML = `
      <div class="card"><div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>${e.message}</p></div></div>`;
  }
}

function criarInstancia() {
  document.getElementById('criarModal').style.display = 'flex';
}

function fecharModal() {
  document.getElementById('criarModal').style.display = 'none';
}

async function confirmarCriacao() {
  const instanceName = document.getElementById('inputInstanceName').value.trim();
  const phoneRaw = document.getElementById('inputPhoneNumber').value.trim();
  if (!instanceName) return toast('Informe o nome da instância', 'danger');
  if (!phoneRaw) return toast('Informe o número da loja', 'danger');
  const phoneNumber = phoneRaw.replace(/\D/g, '');
  if (phoneNumber.length < 10) return toast('Número inválido. Informe DDI + DDD + número.', 'danger');
  try {
    await apiRequest('/whatsapp/criar', {
      method: 'POST',
      body: JSON.stringify({ instanceName, phoneNumber }),
    });
    toast('Instância criada com sucesso!');
    fecharModal();
    document.getElementById('inputInstanceName').value = '';
    document.getElementById('inputPhoneNumber').value = '';
    carregarInstancias();
    const instancias = await apiRequest('/whatsapp');
    if (instancias.length > 0) gerarQR(instancias[0].id);
  } catch (e) {
    toast(e.message, 'danger');
  }
}

async function gerarQR(id) {
  try {
    const res = await apiRequest('/whatsapp/' + id + '/qrcode', { method: 'POST' });
    if (res.base64) {
      mostrarQR({ base64: res.base64, pairingCode: res.pairingCode });
      iniciarPollingQR(id);
    } else {
      toast('QR Code não disponível. Evolution não retornou dados de conexão.', 'danger');
    }
    carregarInstancias();
  } catch (e) {
    toast('Erro ao gerar QR Code: ' + e.message, 'danger');
  }
}

function mostrarQR(qrData) {
  const container = document.getElementById('qrContainer');

  let base64 = typeof qrData === 'object' && qrData !== null ? qrData?.base64 || null : null;
  let pairingCode = typeof qrData === 'string' ? qrData : qrData?.pairingCode || null;

  let content, title;
  if (base64) {
    title = 'QR Code';
    content = `
      <img src="${base64}" alt="QR Code" loading="lazy" style="width:256px;height:256px;margin:16px 0;" />
      <p>Escaneie o QR Code com o WhatsApp do celular da loja</p>`;
  } else if (pairingCode) {
    title = 'Código de Pareamento';
    content = `
      <p style="font-size:28px;font-weight:800;letter-spacing:6px;margin:16px 0;color:#25d366;font-family:monospace;">${pairingCode}</p>
      <p>1. Abra o WhatsApp no celular da loja</p>
      <p>2. Va em <strong>Menu → Dispositivos Conectados → Conectar um dispositivo</strong></p>
      <p>3. Digite o código acima</p>`;
  } else {
    return;
  }

  if (base64 && pairingCode && pairingCode.indexOf('@') === -1 && pairingCode.length < 20) {
    content += `
      <hr style="margin:16px 0;border:none;border-top:1px solid #e2e8f0;">
      <p style="font-size:13px;color:#64748b;">Ou use o código de pareamento:</p>
      <p style="font-size:24px;font-weight:800;letter-spacing:4px;margin:8px 0;color:#25d366;font-family:monospace;">${pairingCode}</p>`;
  }

  container.innerHTML = `
    <div class="card qr-box" id="qrCard">
      <h3><i class="fas fa-qrcode"></i> ${title}</h3>
      ${content}
      <button class="btn btn-ghost" style="margin-top:12px;" onclick="document.getElementById('qrCard').remove()">Fechar</button>
    </div>`;
}

let qrPollingId = null;

async function iniciarPollingQR(id) {
  if (qrPollingId) clearInterval(qrPollingId);
  qrPollingId = setInterval(async () => {
    try {
      const res = await apiRequest('/whatsapp/' + id + '/status');
      if (res.connectionStatus === 'connected' || res.connectionStatus === 'open') {
        clearInterval(qrPollingId);
        qrPollingId = null;
        carregarInstancias();
        return;
      }
      if (res.connectionStatus === 'qrcode' || res.connectionStatus === 'disconnected') {
        const qrRes = await apiRequest('/whatsapp/' + id + '/qrcode', { method: 'POST' });
        if (qrRes.base64) {
          mostrarQR({ base64: qrRes.base64, pairingCode: qrRes.pairingCode });
        }
      }
    } catch (e) {
      // polling continues silently
    }
  }, 10000);
}

async function enviarTeste(id) {
  try {
    await apiRequest('/whatsapp/' + id + '/teste', { method: 'POST' });
    toast('Mensagem de teste enviada com sucesso!');
  } catch (e) {
    toast(e.message, 'danger');
  }
}

async function reconectar(id) {
  try {
    await apiRequest('/whatsapp/' + id + '/reconectar', { method: 'POST' });
    toast('Reconectando...', 'info');
    carregarInstancias();
  } catch (e) {
    toast(e.message, 'danger');
  }
}

async function atualizarStatus(id) {
  try {
    const res = await apiRequest('/whatsapp/' + id + '/status');
    toast('Status: ' + (res.connectionStatus || 'desconhecido'), 'info');
    carregarInstancias();
  } catch (e) {
    toast(e.message, 'danger');
  }
}

async function excluirInstancia(id) {
  if (!(await confirmModal('Excluir esta instância WhatsApp? As notificações pararão de funcionar.'))) return;
  try {
    await apiRequest('/whatsapp/' + id, { method: 'DELETE' });
    toast('Instância removida', 'danger');
    carregarInstancias();
  } catch (e) {
    toast(e.message, 'danger');
  }
}

carregarInstancias();
setInterval(carregarInstancias, 15000);
</script>
<script src="js/theme.js" defer></script>
</body>
</html>
